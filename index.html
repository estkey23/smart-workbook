<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>스마트 드로잉 학습지 교실 ✨</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Fonts & Animations -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Hi+Melody&family=Jua&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700;900&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    @keyframes blob { 0%, 100% { transform: translate(0px, 0px) scale(1); } 50% { transform: translate(30px, -50px) scale(1.1); } }
    .animate-blob { animation: blob 7s infinite ease-in-out; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    @keyframes fade-in-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-down { animation: fade-in-down 0.4s ease-out forwards; }
  </style>

  <!-- React & Firebase & Icons Import Map -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#FFF9F0] text-slate-800 animate-fade-in">
  <div id="root"></div>

  <!-- React Application Code -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, addDoc, getDocs, deleteDoc } from 'firebase/firestore';
    import { Pencil, Eraser, Send, Plus, FileText, AlertCircle, Clock, Trash2, Settings, DownloadCloud, Menu, X, Square, Circle, Triangle, Check, Image as ImageIcon, Video, Link as LinkIcon, Lightbulb, ExternalLink, Eye, EyeOff, Paperclip, Download, Lock, Key, RefreshCw, Clipboard, Sparkles, PaintBucket, ZoomIn, ZoomOut, Maximize2, RotateCcw, BookOpen, School, ChevronLeft, ChevronRight, Palette, Smile, Type, Bold, Italic, Underline, Strikethrough, Undo2, Scissors } from 'lucide-react';

    // 🌟 연동 완료된 선생님 프로젝트 전용 설정값 🌟
    const firebaseConfig = {
      apiKey: "AIzaSyAY5jRQWWKgymfHMmZxR55k_Sy26NrV_yQ",
      authDomain: "smart-work-6baed.firebaseapp.com",
      projectId: "smart-work-6baed",
      storageBucket: "smart-work-6baed.firebasestorage.app",
      messagingSenderId: "952088924411",
      appId: "1:952088924411:web:32dcab321d7348b850e05e",
      measurementId: "G-FDPRHKNKV8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'github-smart-worksheet-v10-final';

    const loadPdfJs = async () => {
      if (window.pdfjsLib) return window.pdfjsLib;
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        script.onload = () => {
          if(!window.pdfjsLib) reject("Failed to load PDF.js");
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          resolve(window.pdfjsLib);
        };
        script.onerror = reject; document.head.appendChild(script);
      });
    };

    const compressImage = (dataUrl, callback) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,img.width,img.height);
        ctx.drawImage(img, 0, 0);
        callback(canvas.toDataURL('image/jpeg', 0.95));
      };
      img.src = dataUrl;
    };

    const DEFAULT_STUDENTS = [
      { id: 'student_1', name: '김민수' }, { id: 'student_2', name: '이지은' },
      { id: 'student_3', name: '박지호' }, { id: 'student_4', name: '최유리' },
      { id: 'student_5', name: '정우진' }, { id: 'student_6', name: '강동우' },
      { id: 'student_7', name: '민아름' }, { id: 'student_8', name: '윤하준' },
      { id: 'student_9', name: '한예원' }, { id: 'student_10', name: '서태웅' },
      { id: 'student_11', name: '신채원' }, { id: 'student_12', name: '송태섭' },
      { id: 'student_13', name: '오세훈' }, { id: 'student_14', name: '윤지민' },
      { id: 'student_15', name: '배주원' }, { id: 'student_16', name: '조현우' },
      { id: 'student_17', name: '하은지' }, { id: 'student_18', name: '임재희' },
      { id: 'student_19', name: '권다은' }, { id: 'student_20', name: '한상우' }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);
      const [assignments, setAssignments] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [credentials, setCredentials] = useState({}); 
      const [students, setStudents] = useState(DEFAULT_STUDENTS); 
      const [schoolInfo, setSchoolInfo] = useState({ schoolName: '행복', grade: '5', classNum: '1' });
      const [appAlert, setAppAlert] = useState({ show: false, title: '', message: '', onConfirm: null, isConfirm: false });
      const [passwordPrompt, setPasswordPrompt] = useState({ show: false, targetRole: null, passwordInput: '', error: '' });

      useEffect(() => {
        signInAnonymously(auth).catch(console.error);
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser); setIsInitializing(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const unsubAssign = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'), (snapshot) => {
          setAssignments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => b.createdAt - a.createdAt));
        });
        const unsubSub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), (snapshot) => {
          setSubmissions(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });
        const unsubCred = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'credentials'), (snapshot) => {
          const creds = {}; snapshot.docs.forEach(doc => { creds[doc.id] = doc.data().password; }); setCredentials(creds);
        });
        const unsubRoster = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'students', 'roster'), (docSnap) => {
          if (docSnap.exists() && docSnap.data().list) setStudents(docSnap.data().list);
          else setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', 'roster'), { list: DEFAULT_STUDENTS });
        });
        const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'schoolInfo'), (docSnap) => {
          if (docSnap.exists()) setSchoolInfo(docSnap.data());
        });
        return () => { unsubAssign(); unsubSub(); unsubCred(); unsubRoster(); unsubSettings(); };
      }, [user]);

      const showAlert = (title, message) => setAppAlert({ show: true, title, message, onConfirm: null, isConfirm: false });
      const showConfirm = (title, message, onConfirm) => setAppAlert({ show: true, title, message, onConfirm, isConfirm: true });

      const handleLoginClick = (selectedRole) => setPasswordPrompt({ show: true, targetRole: selectedRole, passwordInput: '', error: '' });

      if (isInitializing) return <div className="flex h-screen items-center justify-center text-xl font-bold text-indigo-400 bg-indigo-50">마법의 교실로 들어가는 중... ✨</div>;

      return (
        <>
          {appAlert.show && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-indigo-100 text-center animate-fade-in">
                <div className="mx-auto w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mb-4 text-indigo-500"><AlertCircle size={32} /></div>
                <h3 className="text-xl font-black text-slate-800 mb-2">{appAlert.title}</h3>
                <p className="text-slate-500 text-sm mb-6 whitespace-pre-wrap">{appAlert.message}</p>
                <div className="flex gap-3 justify-center">
                  {appAlert.isConfirm && <button onClick={() => setAppAlert({show:false})} className="px-6 py-2.5 bg-slate-100 text-slate-600 rounded-xl font-bold">취소</button>}
                  <button onClick={() => { if (appAlert.onConfirm) appAlert.onConfirm(); setAppAlert({show:false}); }} className="px-8 py-2.5 bg-indigo-500 text-white rounded-xl font-bold shadow-md">확인</button>
                </div>
              </div>
            </div>
          )}

          {!role ? (
            <div className="flex flex-col h-screen items-center justify-center bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 p-4 relative overflow-hidden">
              <div className="absolute top-10 left-10 w-32 h-32 bg-yellow-200 rounded-full blur-2xl opacity-70 animate-blob"></div>
              <div className="absolute top-20 right-20 w-40 h-40 bg-purple-200 rounded-full blur-2xl opacity-70 animate-blob animation-delay-2000"></div>

              {passwordPrompt.show && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                  <form onSubmit={(e) => {
                    e.preventDefault();
                    const roleId = passwordPrompt.targetRole === 'teacher' ? 'teacher' : passwordPrompt.targetRole.id;
                    const savedPassword = credentials[roleId] || '0000';
                    if (passwordPrompt.passwordInput === savedPassword) {
                      setRole(passwordPrompt.targetRole); setPasswordPrompt({ show: false, targetRole: null, passwordInput: '', error: '' });
                    } else setPasswordPrompt(p => ({ ...p, error: '비밀번호가 틀렸습니다! 😢' }));
                  }} className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-indigo-100 animate-fade-in space-y-5">
                    <div className="text-center">
                      <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4"><Lock size={28} /></div>
                      <h3 className="text-xl font-black">{passwordPrompt.targetRole === 'teacher' ? '선생님 안녕하세요! 👩‍🏫' : `${passwordPrompt.targetRole.name} 학생 안녕! 🎒`}</h3>
                    </div>
                    <input type="password" value={passwordPrompt.passwordInput} onChange={(e) => setPasswordPrompt(p => ({ ...p, passwordInput: e.target.value, error: '' }))} placeholder="비밀번호 4자리" autoFocus className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center font-black tracking-[0.5em] text-xl" />
                    {passwordPrompt.error && <p className="text-xs font-bold text-rose-500 text-center">{passwordPrompt.error}</p>}
                    <p className="text-[10px] text-slate-400 text-center">초기 비밀번호는 [ 0000 ] 입니다.</p>
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setPasswordPrompt({ show: false })} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold">닫기</button>
                      <button type="submit" className="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-bold">입장</button>
                    </div>
                  </form>
                </div>
              )}

              {/* 💡 5명씩 4줄이 보장되는 바둑판 배열 (grid-cols-5 강제 적용) */}
              <div className="bg-white/80 backdrop-blur-xl p-8 md:p-10 rounded-[3rem] shadow-2xl text-center max-w-4xl w-full border-4 border-white z-10 transition-all">
                <div className="flex justify-center mb-5 text-indigo-500"><div className="bg-white p-3 rounded-2xl shadow-xl shadow-indigo-100 rotate-3 hover:rotate-6 transition-transform inline-block"><Palette size={48} strokeWidth={2.5}/></div></div>
                <h1 className="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2 tracking-tight">스마트 드로잉 학습지 ✨</h1>
                <p className="text-slate-500 mb-8 font-bold bg-slate-100 inline-block px-4 py-1.5 rounded-full text-sm border border-slate-200">🏫 {schoolInfo.schoolName}학교 {schoolInfo.grade}학년 {schoolInfo.classNum}반</p>
                <div className="space-y-6">
                  <button onClick={() => handleLoginClick('teacher')} className="w-full py-4 bg-slate-800 text-white rounded-2xl font-black text-lg hover:bg-slate-900 transition-all flex items-center justify-center gap-2 shadow-xl shadow-slate-200 hover:-translate-y-1"><Settings size={22} /> 선생님으로 교실 열기</button>
                  <div className="relative py-1"><div className="absolute inset-0 flex items-center"><div className="w-full border-t-2 border-dashed border-slate-200"></div></div><div className="relative flex justify-center"><span className="bg-white/90 rounded-full px-4 py-1 text-xs font-black text-slate-400">우리 반 학생들 명단</span></div></div>
                  <div className="grid grid-cols-5 gap-2 max-h-[340px] overflow-y-auto pr-1 custom-scrollbar p-1">
                    {students.map(student => (
                      <button key={student.id} onClick={() => handleLoginClick(student)} className="py-3 border-2 border-indigo-50 bg-white rounded-2xl font-black text-slate-600 hover:border-indigo-400 hover:bg-indigo-50 hover:text-indigo-700 transition-all flex flex-col items-center justify-center gap-1 shadow-sm hover:shadow-md"><Smile size={16} className="text-indigo-400 shrink-0"/> <span className="text-[11px] truncate max-w-full px-1">{student.name}</span></button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="min-h-screen bg-slate-50 flex flex-col">
              <header className="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-10 shadow-sm hidden-on-canvas">
                <h1 className="text-lg font-black text-indigo-600 flex items-center gap-2"><Palette size={20}/> 스마트 학습지</h1>
                <div className="flex items-center gap-4">
                  <span className="font-bold bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs">{role === 'teacher' ? '👩‍🏫 선생님' : `🎒 ${role.name} 학생`}</span>
                  <button onClick={() => setRole(null)} className="text-xs font-bold text-slate-400 hover:text-rose-500">나가기</button>
                </div>
              </header>
              <main className="flex-1 p-4 md:p-6 max-w-7xl mx-auto w-full">
                {role === 'teacher' ? 
                  <TeacherDashboard assignments={assignments} submissions={submissions} students={students} credentials={credentials} schoolInfo={schoolInfo} showAlert={showAlert} showConfirm={showConfirm} /> : 
                  <StudentDashboard student={role} assignments={assignments} submissions={submissions} credentials={credentials} schoolInfo={schoolInfo} showAlert={showAlert} showConfirm={showConfirm} />
                }
              </main>
            </div>
          )}
        </>
      );
    }

    // ==========================================
    // 👩‍🏫 TEACHER DASHBOARD
    // ==========================================
    function TeacherDashboard({ assignments, submissions, students, credentials, schoolInfo, showAlert, showConfirm }) {
        const [showCreateForm, setShowCreateForm] = useState(false);
        const [selectedAssignment, setSelectedAssignment] = useState(null);
        const [showSettingsModal, setShowSettingsModal] = useState(false); 
        const [assignmentTab, setAssignmentTab] = useState('active'); 
        const [selectedAssignIds, setSelectedAssignIds] = useState([]);

        const [newTeacherPassword, setNewTeacherPassword] = useState('');
        const [passwordConfirm, setPasswordConfirm] = useState('');
        const [bulkStudentInput, setBulkStudentInput] = useState(''); 
        const [tempSchoolInfo, setTempSchoolInfo] = useState(schoolInfo);

        useEffect(() => { setTempSchoolInfo(schoolInfo); }, [schoolInfo, showSettingsModal]);

        const activeAssignments = assignments.filter(a => a.status !== 'closed');
        const closedAssignments = assignments.filter(a => a.status === 'closed');
        const displayedAssignments = assignmentTab === 'active' ? activeAssignments : closedAssignments;

        const handleResetStudentPassword = async (stId, stName) => {
          showConfirm('비밀번호 초기화', `${stName} 학생 비밀번호를 0000으로 초기화할까요?`, async () => {
              try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'credentials', stId), { password: '0000' }); showAlert('성공', '초기화되었습니다.'); } catch(e){}
          });
        };

        const handleChangeTeacherPassword = async (e) => {
          e.preventDefault();
          if (newTeacherPassword !== passwordConfirm) return showAlert('오류', '비밀번호가 다릅니다.');
          try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'credentials', 'teacher'), { password: newTeacherPassword }); showAlert('성공', '변경되었습니다.'); setNewTeacherPassword(''); setPasswordConfirm(''); } catch(e){}
        };

        const handleClearAllData = () => {
          showConfirm('전체 삭제 ⚠️', '제출된 모든 과제물 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.', async () => {
            try {
              const qSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'));
              qSnap.docs.forEach(d => deleteDoc(d.ref));
              showAlert('삭제 완료', '제출 데이터가 완전히 비워졌습니다!');
            } catch (e) { showAlert('오류', '문제가 발생했습니다.'); }
          });
        };

        const handleDeleteSelectedAssignments = () => {
          if (selectedAssignIds.length === 0) return showAlert('알림', '삭제할 과제를 먼저 선택해주세요!');
          showConfirm('선택 과제 삭제', `선택한 ${selectedAssignIds.length}개의 과제를 완전 삭제하시겠습니까?`, async () => {
            try {
              const deletePromises = selectedAssignIds.map(id => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id)));
              await Promise.all(deletePromises);

              const qSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'));
              const subDeletePromises = qSnap.docs.filter(d => selectedAssignIds.includes(d.data().assignmentId)).map(d => deleteDoc(d.ref));
              await Promise.all(subDeletePromises);

              showAlert('삭제 완료 ✨', '선택한 과제가 삭제되었습니다.');
              setSelectedAssignIds([]); setSelectedAssignment(null);
            } catch(e) { showAlert('오류', '삭제 중 문제가 발생했습니다.'); }
          });
        };

        return (
          <div className="space-y-6 animate-fade-in w-full flex-1 flex flex-col min-h-0">
            {/* 설정 모달 */}
            {showSettingsModal && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[120] flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl p-6 shadow-xl max-w-2xl w-full border border-slate-100 max-h-[90vh] overflow-y-auto custom-scrollbar">
                  <div className="flex justify-between items-center border-b pb-3 mb-4">
                    <h3 className="font-black flex items-center gap-2"><Settings size={18}/> 학급 관리</h3>
                    <button onClick={() => setShowSettingsModal(false)} className="text-slate-400"><X size={20}/></button>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="bg-slate-50 p-4 rounded-2xl border space-y-3">
                      <h4 className="text-xs font-black">🏫 학교 정보 변경</h4>
                      <div className="flex gap-2">
                        <input type="text" value={tempSchoolInfo.schoolName} onChange={e=>setTempSchoolInfo({...tempSchoolInfo, schoolName:e.target.value})} className="w-full p-2 text-xs border rounded-lg" placeholder="학교명"/>
                        <input type="number" value={tempSchoolInfo.grade} onChange={e=>setTempSchoolInfo({...tempSchoolInfo, grade:e.target.value})} className="w-20 p-2 text-xs border rounded-lg" placeholder="학년"/>
                        <input type="number" value={tempSchoolInfo.classNum} onChange={e=>setTempSchoolInfo({...tempSchoolInfo, classNum:e.target.value})} className="w-20 p-2 text-xs border rounded-lg" placeholder="반"/>
                      </div>
                      <button onClick={async ()=>{ await setDoc(doc(db,'artifacts',appId,'public','data','settings','schoolInfo'), tempSchoolInfo); showAlert('완료','저장되었습니다.');}} className="w-full py-2 bg-indigo-500 text-white font-bold text-xs rounded-xl">저장</button>
                    </div>
                    <div className="bg-slate-50 p-4 rounded-2xl border space-y-3">
                      <h4 className="text-xs font-black">🔑 교사 비밀번호 변경</h4>
                      <input type="password" value={newTeacherPassword} onChange={e=>setNewTeacherPassword(e.target.value)} className="w-full p-2 text-xs border rounded-lg" placeholder="새 비밀번호" />
                      <input type="password" value={passwordConfirm} onChange={e=>setPasswordConfirm(e.target.value)} className="w-full p-2 text-xs border rounded-lg" placeholder="새 비밀번호 확인" />
                      <button onClick={handleChangeTeacherPassword} className="w-full py-2 bg-slate-800 text-white font-bold text-xs rounded-xl">비밀번호 변경</button>
                    </div>
                    <div className="col-span-1 md:col-span-2 bg-slate-50 p-4 rounded-2xl border space-y-3">
                      <h4 className="text-xs font-black">👥 학생 명단 교체 (엔터로 구분)</h4>

    function CreateAssignmentForm({ onClose, showAlert }) {
        const [title, setTitle] = useState('');
        const [instructions, setInstructions] = useState('');
        const [deadline, setDeadline] = useState('');
        const [orientation, setOrientation] = useState('portrait');
        const [baseImages, setBaseImages] = useState([]); 
        const [isConvertingPdf, setIsConvertingPdf] = useState(false);

        const handleBaseImageUpload = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          if (file.type === 'application/pdf') {
            setIsConvertingPdf(true);
            showAlert('PDF 분석 중... ⏳', '문서를 최적화 변환하고 있습니다.');
            try {
              const pdfjsLib = await loadPdfJs();
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              const numPages = Math.min(pdf.numPages, 5); 
              const extractedImages = [];
              for (let i = 1; i <= numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                extractedImages.push(canvas.toDataURL('image/jpeg', 1.0));
              }
              setBaseImages(extractedImages);
              showAlert('변환 성공!', 'A4 맞춤 해상도로 준비되었습니다.');
            } catch (err) { showAlert('오류', 'PDF 변환 에러.'); } finally { setIsConvertingPdf(false); }
          } else if (file.type.startsWith('image/')) {
            compressImage(URL.createObjectURL(file), url => setBaseImages([url]));
          }
        };
      
        return (
          <form onSubmit={async (e) => {
            e.preventDefault();
            if (!title) return;
            try {
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'), { title, instructions, deadline, orientation, baseImages, status: 'active', createdAt: Date.now() });
              onClose();
            } catch (e) { showAlert('오류', '전송 실패'); }
          }} className="bg-white p-8 rounded-[2rem] shadow-2xl border-4 border-indigo-50 mb-6 animate-fade-in-down">
            <h2 className="text-xl font-black mb-4">새 과제 배포하기</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="space-y-4">
                <input type="text" required value={title} onChange={e=>setTitle(e.target.value)} className="w-full p-3 bg-slate-50 border rounded-xl text-sm" placeholder="과제 제목" />
                <input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} className="w-full p-3 bg-slate-50 border rounded-xl text-sm" />
                <textarea value={instructions} onChange={e=>setInstructions(e.target.value)} className="w-full h-24 p-3 bg-slate-50 border rounded-xl text-sm custom-scrollbar" placeholder="전달할 가이드라인" />
              </div>
              <div className={`relative border-2 border-dashed h-full min-h-[150px] flex flex-col items-center justify-center rounded-2xl p-4 transition-colors ${isConvertingPdf ? 'border-amber-400 bg-amber-50' : 'border-indigo-200 bg-indigo-50'}`}>
                 {!isConvertingPdf && <input type="file" accept="image/*,application/pdf" onChange={handleBaseImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />}
                 {isConvertingPdf ? <span className="text-xs font-black animate-pulse">PDF 변환하는 중...</span> : baseImages.length > 0 ? <span className="text-xs font-black text-emerald-600">배경 {baseImages.length}장 설정완료!</span> : <span className="text-xs font-black text-indigo-500">배경 학습지 (PDF / 이미지)</span>}
              </div>
            </div>
            <div className="mt-6 flex justify-end gap-2"><button type="button" onClick={onClose} className="px-4 py-2 bg-slate-100 rounded-lg text-xs font-black">취소</button><button type="submit" disabled={isConvertingPdf} className="px-6 py-2 bg-indigo-500 text-white rounded-lg text-xs font-black">완료</button></div>
          </form>
        )
    }
      
    function GradingPanel({ assignment, submissions, students, schoolInfo, showAlert, showConfirm }) {
        const [selectedSubId, setSelectedSubId] = useState(null);
        const [gradingPage, setGradingPage] = useState(0); 
        const [selectedSubmissions, setSelectedSubmissions] = useState([]); 
      
        useEffect(() => { setGradingPage(0); }, [selectedSubId]);

        const selectedSubmission = submissions.find(s => s.id === selectedSubId);
        const bgImages = assignment.baseImages || [];

        const toggleAssignmentStatus = () => {
          const newStatus = assignment.status === 'closed' ? 'active' : 'closed';
          showConfirm('과제 상태', '상태를 변경할까요?', async () => {
            try {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', assignment.id), { status: newStatus });
              setSelectedSubId(null);
            } catch (e) {}
          });
        };

        // 💡 뱃지 텍스트를 가장 짧고 간결하게 줄여 1줄 정렬을 강력하게 보장합니다.
        const getStatusBadge = (sub) => {
          if (!sub) return <span className="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-md text-[8px] whitespace-nowrap shrink-0 tracking-tighter">미제출</span>;
          if (sub.status === 'submitted') return <span className="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded-md border border-indigo-200 text-[8px] whitespace-nowrap shrink-0 font-black tracking-tighter">제출 🔴</span>;
          if (sub.status === 'resubmit') return <span className="bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-md text-[8px] whitespace-nowrap shrink-0 font-black tracking-tighter">재도전 🔄</span>;
          if (sub.status === 'graded') return <span className="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-md text-[8px] whitespace-nowrap shrink-0 font-black tracking-tighter">평가 ⭐️</span>;
          return <span className="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-md text-[8px] whitespace-nowrap shrink-0 tracking-tighter">작성중</span>;
        }

        const handleDownloadSelected = () => {
          if(selectedSubmissions.length === 0) return showAlert('알림', '과제를 먼저 선택해 주세요!');
          selectedSubmissions.forEach(id => {
              const sub = submissions.find(s => s.id === id);
              if(!sub) return;
              const pagesToDownload = sub.pagesData || [sub.drawingData];
              pagesToDownload.forEach((drawingUrl, idx) => {
                  if(!drawingUrl) return;
                  const bgUrl = bgImages[idx];
                  const imgBg = new Image(); const imgDrawing = new Image();
                  let loaded = 0;
                  const onLoaded = () => {
                      const canvas = document.createElement('canvas');
                      const w = imgBg.width || 800; const h = imgBg.height || 1131;
                      canvas.width = w; canvas.height = h;
                      const ctx = canvas.getContext('2d');
                      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
                      if (bgUrl && imgBg.src) ctx.drawImage(imgBg, 0, 0, w, h);
                      ctx.drawImage(imgDrawing, 0, 0, w, h);
                      const link = document.createElement('a');
                      link.download = `[${schoolInfo.grade}-${schoolInfo.classNum}]_${sub.studentName}_${idx+1}쪽.jpg`;
                      link.href = canvas.toDataURL('image/jpeg', 0.95);
                      document.body.appendChild(link); link.click(); document.body.removeChild(link);
                  };
                  imgDrawing.onload = () => { loaded++; if(loaded === (bgUrl?2:1)) onLoaded(); };
                  if (bgUrl) { imgBg.onload = () => { loaded++; if(loaded === 2) onLoaded(); }; imgBg.src = bgUrl; }
                  else { imgDrawing.src = drawingUrl; }
              });
          });
          showAlert('완료', '컴퓨터 다운로드 처리가 완료되었습니다.'); setSelectedSubmissions([]);
        };

        const handleFeedback = async (type) => {
          if (!selectedSubmission) return;
          let newStatus = 'graded'; let fb = type;
          if (type === 'resubmit') { newStatus = 'resubmit'; fb = '조금 아쉬워요! 다시 확인해보고 제출해볼까요? 💪'; }
          try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', selectedSubmission.id), { status: newStatus, feedback: fb, updatedAt: Date.now() });
            showAlert('완료', '피드백을 보냈습니다!'); setSelectedSubId(null);
          } catch(e) {}
        };

        const pagesData = selectedSubmission?.pagesData || (selectedSubmission?.drawingData ? [selectedSubmission.drawingData] : []);
      
        return (
          <div className="bg-white rounded-[2rem] shadow-sm border border-slate-200 h-full flex flex-col overflow-hidden w-full">
            <div className="p-4 border-b-2 border-slate-100 bg-slate-50 flex items-center justify-between flex-wrap gap-2 shrink-0">
              <h3 className="font-black text-sm text-slate-700 flex items-center gap-1.5"><FileText size={18}/> 검사 창</h3>
              <div className="flex gap-2">
                <button onClick={handleDownloadSelected} className="px-3.5 py-1.5 rounded-xl font-black text-xs bg-teal-100 text-teal-700 hover:bg-teal-200 transition-colors"><DownloadCloud size={12} className="inline mr-1"/>다운로드 ({selectedSubmissions.length})</button>
                <button onClick={toggleAssignmentStatus} className={`px-3.5 py-1.5 rounded-xl font-black text-xs transition-colors ${assignment.status === 'closed' ? 'bg-slate-200' : 'bg-rose-100 text-rose-600'}`}>{assignment.status==='closed'?'과제 열기':'과제 종료'}</button>
              </div>
            </div>
            
            <div className="flex flex-col md:flex-row flex-1 overflow-hidden min-h-0">
              <div className="md:w-[32%] border-r-2 border-slate-100 overflow-y-auto bg-white p-2 space-y-1.5 custom-scrollbar shrink-0">
                <div className="flex items-center px-2 mb-2 gap-2 mt-1">
                   <input type="checkbox" onChange={(e) => e.target.checked ? setSelectedSubmissions(submissions.filter(s=>s.assignmentId===assignment.id).map(s=>s.id)) : setSelectedSubmissions([])} checked={selectedSubmissions.length > 0 && selectedSubmissions.length === submissions.filter(s=>s.assignmentId===assignment.id).length} className="w-4 h-4 text-indigo-600 rounded cursor-pointer" />
                   <span className="text-[11px] font-black text-slate-500">모두 선택</span>
                </div>
                {students.map(student => {
                  const sub = submissions.find(s => s.assignmentId === assignment.id && s.studentId === student.id);
                  const isChecked = sub ? selectedSubmissions.includes(sub.id) : false;
                  return (
                    <div key={student.id} className={`p-2 rounded-xl flex items-center transition-all border-2 ${selectedSubmission?.id === sub?.id ? 'bg-indigo-50 border-indigo-300 shadow-sm' : 'bg-white border-transparent hover:border-slate-200'}`}>
                      <div className="flex items-center gap-1.5 w-full min-w-0">
                        <input type="checkbox" disabled={!sub} checked={isChecked} onChange={(e) => { e.stopPropagation(); if(e.target.checked) setSelectedSubmissions([...selectedSubmissions, sub.id]); else setSelectedSubmissions(selectedSubmissions.filter(id=>id!==sub.id)); }} className="w-3.5 h-3.5 text-indigo-600 rounded cursor-pointer shrink-0" />
                        <div className="flex-1 flex items-center justify-between cursor-pointer min-w-0" onClick={() => sub && setSelectedSubId(sub.id)}>
                          <div className="flex items-center gap-1 min-w-0 shrink-0 mr-1">
                             <div className="w-6 h-6 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500 font-black text-[9px] shrink-0">{student.name.charAt(0)}</div>
                             <span className="font-black text-slate-700 text-[11px] truncate shrink-0 max-w-[50px]">{student.name}</span>
                          </div>
                          <div className="shrink-0 flex items-center">{getStatusBadge(sub)}</div>
                        </div>
                      </div>
                    </div>
                  )
                })}
              </div>

              <div className="md:w-[68%] p-3 flex flex-col bg-slate-100 flex-1 overflow-y-auto custom-scrollbar min-h-0">
                {selectedSubmission ? (
                  <div className="space-y-3 flex-1 flex flex-col min-h-0">
                    <div className="bg-white min-h-[350px] flex-1 rounded-3xl shadow-inner border border-slate-200 overflow-hidden relative flex flex-col items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                       {bgImages[gradingPage] && <img src={bgImages[gradingPage]} className="absolute inset-0 w-full h-full object-contain pointer-events-none rounded-xl" />}
                       {pagesData[gradingPage] ? <img src={pagesData[gradingPage]} className="absolute inset-0 w-full h-full object-contain z-10 pointer-events-none drop-shadow-sm" /> : <div className="z-20 text-slate-300 font-bold"><Pencil size={32} className="mx-auto mb-2 opacity-50"/>빈 도화지</div>}
                       {pagesData.length > 1 && (
                         <div className="absolute bottom-5 z-20 bg-white/90 backdrop-blur-md rounded-full px-4 py-1.5 flex items-center gap-3 shadow-md border">
                            <button onClick={() => setGradingPage(prev => Math.max(0, prev - 1))} disabled={gradingPage === 0} className="disabled:opacity-30"><ChevronLeft size={16}/></button>
                            <span className="text-xs font-black w-8 text-center">{gradingPage + 1} / {pagesData.length}</span>
                            <button onClick={() => setGradingPage(prev => Math.min(pagesData.length - 1, prev + 1))} disabled={gradingPage === pagesData.length - 1} className="disabled:opacity-30"><ChevronRight size={16}/></button>
                         </div>
                       )}
                    </div>
                    <div className="bg-white p-3 rounded-2xl flex gap-2 shrink-0 shadow-sm border border-slate-100">
                      <button onClick={()=>handleFeedback('최고! 🌟')} className="flex-1 py-2 bg-indigo-100 text-indigo-700 font-black rounded-xl text-[11px] whitespace-nowrap">최고! 🌟</button>
                      <button onClick={()=>handleFeedback('참 잘했어요 👏')} className="flex-1 py-2 bg-emerald-100 text-emerald-800 font-black rounded-xl text-[11px] whitespace-nowrap">잘했어요 👏</button>
                      <button onClick={()=>handleFeedback('노력상 💖')} className="flex-1 py-2 bg-pink-100 text-pink-700 font-black rounded-xl text-[11px] whitespace-nowrap">노력상 💖</button>
                      <button onClick={()=>handleFeedback('resubmit')} className="flex-1 py-2 bg-amber-100 text-amber-800 font-black rounded-xl text-[11px] whitespace-nowrap">다시 도전 🔄</button>
                    </div>
                  </div>
                ) : <div className="flex-1 flex flex-col items-center justify-center text-slate-400 font-bold text-sm bg-white rounded-3xl border border-dashed border-slate-200">학생 이름과 체크박스를 누르세요 👀</div>}
              </div>
            </div>
          </div>
        )
    }

    function StudentDashboard({ student, assignments, submissions, credentials, schoolInfo, showAlert, showConfirm }) {
      const [activeTab, setActiveTab] = useState('new');
      const [activeAssignment, setActiveAssignment] = useState(null);
      const [showPasswordChangeModal, setShowPasswordChangeModal] = useState(false); 
      const [currPassword, setCurrPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [newPasswordConfirm, setNewPasswordConfirm] = useState('');

      const newAssignments = []; const inProgressAssignments = []; const resubmitAssignments = []; const submittedAssignments = [];

      assignments.forEach(assign => {
        const sub = submissions.find(s => s.assignmentId === assign.id && s.studentId === student.id);
        if (!sub) newAssignments.push({ ...assign, subStatus: 'new' });
        else if (sub.status === 'in_progress') inProgressAssignments.push({ ...assign, submission: sub, subStatus: 'in_progress' });
        else if (sub.status === 'resubmit') resubmitAssignments.push({ ...assign, submission: sub, subStatus: 'resubmit' });
        else submittedAssignments.push({ ...assign, submission: sub, subStatus: sub.status });
      });

      useEffect(() => {
        const header = document.querySelector('.hidden-on-canvas');
        if (header) header.style.display = activeAssignment ? 'none' : 'flex';
        document.body.style.overflow = activeAssignment ? 'hidden' : 'auto';
      }, [activeAssignment]);

      const tabs = [
        { id: 'new', label: '새 과제 🎁', count: newAssignments.length, data: newAssignments },
        { id: 'inProgress', label: '푸는중 ✏️', count: inProgressAssignments.length, data: inProgressAssignments },
        { id: 'resubmit', label: '다시도전 🔄', count: resubmitAssignments.length, data: resubmitAssignments, alert: true },
        { id: 'submitted', label: '제출완료 💯', count: submittedAssignments.length, data: submittedAssignments },
      ];

      const handleStudentPasswordChange = async (e) => {
        e.preventDefault();
        const savedPassword = credentials[student.id] || '0000';
        if (currPassword !== savedPassword) return showAlert('오류', '현재 비밀번호가 다릅니다.');
        if (newPassword !== newPasswordConfirm) return showAlert('오류', '새 비밀번호 확인이 일치하지 않습니다.');
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'credentials', student.id), { password: newPassword });
          showAlert('성공', '비밀번호가 변경되었습니다!');
          setShowPasswordChangeModal(false); setCurrPassword(''); setNewPassword(''); setNewPasswordConfirm('');
        } catch (err) { showAlert('오류', '실패했습니다.'); }
      };

      if (activeAssignment) {
        return <div className="fixed inset-0 bg-[#FFF9F0] z-50 flex flex-col"><DrawingCanvas assignment={activeAssignment} student={student} onClose={() => setActiveAssignment(null)} showAlert={showAlert} showConfirm={showConfirm} /></div>;
      }

      return (
        <div className="w-full pb-10 space-y-6 animate-fade-in flex flex-col flex-1 h-full min-h-0">
          {showPasswordChangeModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[120] flex items-center justify-center p-4">
              <form onSubmit={handleStudentPasswordChange} className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-teal-100 animate-fade-in space-y-4">
                <div className="text-center mb-4"><div className="w-16 h-16 bg-teal-100 text-teal-500 rounded-full flex items-center justify-center mx-auto mb-2"><Key size={32}/></div><h3 className="text-xl font-black text-slate-800">나만의 암호 만들기</h3></div>
                <input type="password" value={currPassword} onChange={e=>setCurrPassword(e.target.value)} placeholder="현재 암호 (기본 0000)" className="w-full p-3.5 bg-slate-50 border rounded-xl text-center tracking-widest font-black outline-none" />
                <input type="password" value={newPassword} onChange={e=>setNewPassword(e.target.value)} placeholder="새로운 암호" className="w-full p-3.5 bg-teal-50 border rounded-xl text-center tracking-widest font-black outline-none" />
                <input type="password" value={newPasswordConfirm} onChange={e=>setNewPasswordConfirm(e.target.value)} placeholder="새 암호 한번 더!" className="w-full p-3.5 bg-teal-50 border rounded-xl text-center tracking-widest font-black outline-none" />
                <div className="flex gap-2 pt-2"><button type="button" onClick={()=>setShowPasswordChangeModal(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black text-sm">취소</button><button type="submit" className="flex-1 py-3 bg-teal-500 text-white rounded-xl font-black text-sm shadow-md">변경</button></div>
              </form>
            </div>
          )}

          <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-4 shrink-0">
             <div className="flex items-center gap-4">
               <div className="w-14 h-14 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center text-2xl">🎒</div>
               <div><h2 className="text-lg font-black"><span className="text-indigo-600">{student.name}</span> 친구, 환영해요!</h2><p className="text-xs font-bold text-slate-400">오늘도 신나게 공부를 시작해볼까요?</p></div>
             </div>
             <div className="flex gap-2 w-full md:w-auto">
               <button onClick={() => {
                  setActiveAssignment({
                    id: `practice_${student.id}`, title: '📝 무한 자유 연습장', orientation: 'portrait', isPractice: true, subStatus: 'in_progress',
                    submission: submissions.find(s => s.assignmentId === `practice_${student.id}`)
                  });
               }} className="flex-1 md:flex-none px-6 py-3.5 bg-gradient-to-r from-amber-400 to-orange-400 text-white rounded-2xl font-black text-xs shadow-md">📝 연습장 펴기</button>
               <button onClick={() => setShowPasswordChangeModal(true)} className="px-5 py-3.5 bg-slate-100 text-slate-600 rounded-2xl font-black text-xs shrink-0"><Settings size={16}/></button>
             </div>
          </div>

          <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar shrink-0 border-b border-slate-200">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-3 font-black text-sm transition-all border-b-4 whitespace-nowrap ${activeTab === tab.id ? 'border-indigo-600 text-indigo-600 bg-indigo-50/50' : 'border-transparent text-slate-400 hover:bg-slate-50'}`}>
                {tab.label} {tab.count > 0 && <span className={`ml-1.5 px-1.5 py-0.5 rounded-md text-[10px] ${tab.alert?'bg-rose-500 text-white animate-pulse':'bg-slate-200 text-slate-600'}`}>{tab.count}</span>}
              </button>
            ))}
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto custom-scrollbar pr-1 pb-4 flex-1 min-h-0">
            {tabs.find(t => t.id === activeTab).data.length === 0 ? (
              <div className="col-span-full py-20 text-center text-slate-400 font-bold text-sm bg-white rounded-3xl border border-dashed border-slate-200 flex items-center justify-center">이 탭에는 과제가 없습니다! 🎉</div>
            ) : (
              tabs.find(t => t.id === activeTab).data.map(assign => (
                <div key={assign.id} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 flex flex-col justify-between hover:-translate-y-1 transition-transform cursor-pointer h-full" onClick={() => setActiveAssignment(assign)}>
                  <div>
                    <span className="text-[10px] font-black px-2 py-1 rounded bg-indigo-50 text-indigo-600 border border-indigo-100">{assign.deadline || '기한없음'}</span>
                    <h3 className="text-base font-black text-slate-800 mt-3 mb-2 leading-snug">{assign.title}</h3>
                    {assign.submission?.feedback && <p className="text-[10px] text-amber-700 bg-amber-50 p-2 rounded-lg font-bold mb-2 break-keep border border-amber-100">💌 {assign.submission.feedback}</p>}
                  </div>
                  <button className="mt-4 w-full py-3 bg-indigo-50 text-indigo-600 font-black text-xs rounded-xl hover:bg-indigo-100 transition-colors border border-indigo-100">학습지 펴기 ✨</button>
                </div>
              ))
            )}
          </div>
        </div>
      )
    }

    // ==========================================
    // 🎨 FULLSCREEN DRAWING CANVAS
    // ==========================================
    function DrawingCanvas({ assignment, student, onClose, showAlert, showConfirm }) {
      const canvasRefs = useRef({}); const previewCanvasRef = useRef(null); const containerRef = useRef(null); const canvasContainerRef = useRef(null);
      const lastPosRef = useRef({ x: 0, y: 0 }); 
      
      const bgImages = assignment.baseImages || [];
      const [pages, setPages] = useState(() => {
        if (assignment.submission?.pagesData && assignment.submission.pagesData.length > 0) return assignment.submission.pagesData;
        if (assignment.submission?.drawingData) return [assignment.submission.drawingData];
        if (bgImages.length > 0) return Array(bgImages.length).fill('');
        return ['']; 
      });
      const [currentPageIndex, setCurrentPageIndex] = useState(0);

      const [layers, setLayers] = useState([{ id: 'layer_1', name: '🎨 기본 필기', visible: true, zIndex: 2 }]);
      const [activeLayerId, setActiveLayerId] = useState('layer_1');
      const [canvasSize, setCanvasSize] = useState({ w: 800, h: 1131 }); 
      
      const [isDrawing, setIsDrawing] = useState(false); const [drawStartCoords, setDrawStartCoords] = useState({ x: 0, y: 0 });
      const [tool, setTool] = useState('pen'); const [penType, setPenType] = useState('signpen'); 
      const [color, setColor] = useState('#1e1e1e'); const [lineWidth, setLineWidth] = useState(4); const [opacity, setOpacity] = useState(1.0); 
      const [fillShape, setFillShape] = useState(false); const [activeText, setActiveText] = useState(null); 
      const [fontFamily, setFontFamily] = useState("'Jua', sans-serif"); const [textStyle, setTextStyle] = useState({ bold: false, italic: false, underline: false, strike: false });
      const [activeSelection, setActiveSelection] = useState(null); const [inputMode, setInputMode] = useState('all'); 
      const [zoomScale, setZoomScale] = useState(1.0); const [isToolbarOpen, setIsToolbarOpen] = useState(true);
      const [isSubmitting, setIsSubmitting] = useState(false); const [undoStack, setUndoStack] = useState({});

      const layersRef = useRef(layers); useEffect(() => { layersRef.current = layers; }, [layers]);
      const currentSubmissionId = assignment.submission?.id || null;
      const isReadOnly = assignment.status === 'closed' || assignment.subStatus === 'submitted' || assignment.subStatus === 'graded';

      const HIGHLIGHTER_COLORS = [{ value: '#FDE047' }, { value: '#FDBA74' }, { value: '#F9A8D4' }, { value: '#7DD3FC' }];
      useEffect(() => { if (penType === 'highlighter' && !HIGHLIGHTER_COLORS.find(c=>c.value===color)) setColor('#FDE047'); }, [penType]);

      // 화면 리사이즈
      useEffect(() => {
        const updateSize = () => {
            const c = containerRef.current; if (!c) return;
            let w = c.clientWidth; if (w === 0) w = window.innerWidth * 0.8; 
            let h = w / (assignment.orientation === 'landscape' ? 1.414 : 0.707);
            if (h > c.clientHeight && c.clientHeight > 0) { h = c.clientHeight; w = h * (assignment.orientation === 'landscape' ? 1.414 : 0.707); }
            w = Math.floor(w); h = Math.floor(h);
            if (w > 0 && h > 0) setCanvasSize({ w, h });
            if (window.innerWidth < 768) setIsToolbarOpen(false);
        };
        updateSize(); window.addEventListener('resize', updateSize);
        return () => window.removeEventListener('resize', updateSize);
      }, [assignment.orientation]); 

      // 캔버스 복원
      useEffect(() => {
        if (canvasSize.w === 800 || canvasSize.w === 0) return; 
        const w = canvasSize.w; const h = canvasSize.h;
        if (previewCanvasRef.current) { previewCanvasRef.current.width = w; previewCanvasRef.current.height = h; }
        layers.forEach(layer => {
          const cvs = canvasRefs.current[layer.id];
          if (cvs) { cvs.width = w; cvs.height = h; cvs.getContext('2d').clearRect(0,0,w,h); }
        });
        const pageDataUrl = pages[currentPageIndex];
        if (pageDataUrl && canvasRefs.current['layer_1']) {
          const img = new Image(); img.onload = () => canvasRefs.current['layer_1'].getContext('2d').drawImage(img, 0, 0, w, h); img.src = pageDataUrl;
        }
      }, [canvasSize.w, canvasSize.h, currentPageIndex]);

      const pushUndoState = () => {
        if (isReadOnly) return;
        const cvs = canvasRefs.current[activeLayerId]; if (!cvs) return;
        const state = cvs.toDataURL('image/png');
        setUndoStack(prev => { const s = prev[activeLayerId] || []; s.push(state); if(s.length>20) s.shift(); return {...prev, [activeLayerId]: s}; });
      };

      const handleUndo = () => {
        if (isReadOnly) return;
        const stack = undoStack[activeLayerId] || [];
        if (!stack.length) return showAlert('알림', '더 되돌릴 작업이 없습니다.');
        const prevState = stack.pop(); setUndoStack(prev => ({...prev, [activeLayerId]: stack}));
        const img = new Image();
        img.onload = () => {
            const ctx = canvasRefs.current[activeLayerId].getContext('2d');
            ctx.clearRect(0, 0, canvasSize.w, canvasSize.h); ctx.drawImage(img, 0, 0);
        };
        img.src = prevState;
      };

      const getActiveAlpha = () => {
        if (tool === 'eraser') return 1.0;
        switch (penType) { case 'pencil': return opacity*0.28; case '4b': return opacity*0.55; case 'ballpoint': return opacity*0.95; case 'highlighter': return opacity*0.5; case 'brush': return opacity*0.85; default: return opacity*1.0; }
      };

      const applyContextStyle = (ctx, isEraser = false, forceSolid = false) => {
        ctx.shadowBlur = 0; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (isEraser) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = lineWidth * 5; ctx.globalAlpha = 1.0; } 
        else {
          ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = lineWidth;
          switch (penType) {
            case 'pencil': ctx.lineWidth = Math.max(0.7, lineWidth*0.25); break;
            case '4b': ctx.shadowBlur = lineWidth*0.35; ctx.shadowColor = color; ctx.lineWidth = lineWidth*0.7; break;
            case 'ballpoint': ctx.lineWidth = Math.max(1.5, lineWidth*0.6); break;
            case 'highlighter': ctx.lineWidth = lineWidth*3.5; break; 
            case 'brush': ctx.shadowBlur = lineWidth*1.5; ctx.shadowColor = color; break;
          }
          ctx.globalAlpha = forceSolid ? 1.0 : getActiveAlpha();
        }
      };

      const getCoordinates = (e) => {
        const cvs = canvasRefs.current[activeLayerId]; if (!cvs) return { x: 0, y: 0 };
        const rect = cvs.getBoundingClientRect(); if (rect.width === 0) return { x: 0, y: 0 }; 
        const scaleX = cvs.width / rect.width; const scaleY = cvs.height / rect.height;
        const cX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const cY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        return { x: (cX - rect.left) * scaleX, y: (cY - rect.top) * scaleY };
      };

      const startDrawing = (e) => {
        if (isReadOnly) return;
        if (inputMode === 'pen' && e.pointerType !== 'pen') return; 
        const { x, y } = getCoordinates(e);
        if (tool === 'select') { if(!activeSelection) { setDrawStartCoords({x,y}); setIsDrawing(true); } return; }
        if (tool === 'text') { if(!activeText) setActiveText({x,y,text:''}); return; }
        pushUndoState(); setDrawStartCoords({ x, y }); setIsDrawing(true); lastPosRef.current = { x, y };

        if (tool === 'pen') {
          const pCtx = previewCanvasRef.current.getContext('2d'); pCtx.clearRect(0, 0, canvasSize.w, canvasSize.h);
          applyContextStyle(pCtx, false, true); pCtx.beginPath(); pCtx.moveTo(x, y); pCtx.lineTo(x, y+0.1); pCtx.stroke();
        } else if (tool === 'eraser') {
          const lCtx = canvasRefs.current[activeLayerId].getContext('2d');
          applyContextStyle(lCtx, true, false); lCtx.beginPath(); lCtx.moveTo(x, y);
        }
      };

      const draw = (e) => {
        if (!isDrawing || isReadOnly) return;
        const activeCanvas = canvasRefs.current[activeLayerId]; const previewCanvas = previewCanvasRef.current;
        if (!activeCanvas || !previewCanvas) return;
        const { x, y } = getCoordinates(e);

        if (tool === 'select') {
           const pCtx = previewCanvas.getContext('2d'); pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
           pCtx.setLineDash([6, 6]); pCtx.strokeStyle = '#3b82f6'; pCtx.lineWidth = 3;
           pCtx.strokeRect(drawStartCoords.x, drawStartCoords.y, x - drawStartCoords.x, y - drawStartCoords.y); pCtx.setLineDash([]); return;
        }

        if (tool === 'pen') {
          const pCtx = previewCanvas.getContext('2d'); applyContextStyle(pCtx, false, true); 
          if (e.pointerType === 'pen' && e.pressure) pCtx.lineWidth *= (0.5 + e.pressure);
          pCtx.beginPath(); pCtx.moveTo(lastPosRef.current.x, lastPosRef.current.y); pCtx.lineTo(x, y); pCtx.stroke();
          lastPosRef.current = { x, y };
        } else if (tool === 'eraser') {
          const lCtx = activeCanvas.getContext('2d'); lCtx.lineTo(x, y); lCtx.stroke(); lCtx.beginPath(); lCtx.moveTo(x, y);
        }
      };

      const stopDrawing = (e) => {
        if (!isDrawing) return; setIsDrawing(false);
        const activeCanvas = canvasRefs.current[activeLayerId]; const previewCanvas = previewCanvasRef.current;
        const { x, y } = getCoordinates(e);

        if (tool === 'select') {
            const sX = drawStartCoords.x; const sY = drawStartCoords.y;
            const rX = Math.min(sX, x); const rY = Math.min(sY, y); const rW = Math.abs(x - sX); const rH = Math.abs(y - sY);
            if (rW > 10 && rH > 10) {
                pushUndoState();
                const tmp = document.createElement('canvas'); tmp.width = rW; tmp.height = rH;
                tmp.getContext('2d').putImageData(activeCanvas.getContext('2d').getImageData(rX, rY, rW, rH), 0, 0);
                setActiveSelection({ x: rX, y: rY, w: rW, h: rH, dataUrl: tmp.toDataURL() });
                activeCanvas.getContext('2d').clearRect(rX, rY, rW, rH);
            }
            previewCanvas.getContext('2d').clearRect(0,0, previewCanvas.width, previewCanvas.height); return;
        }

        if (tool === 'pen') { 
            const lCtx = activeCanvas.getContext('2d'); lCtx.save(); lCtx.globalAlpha = getActiveAlpha();
            lCtx.globalCompositeOperation = 'source-over'; lCtx.drawImage(previewCanvas, 0, 0); lCtx.restore();
            previewCanvas.getContext('2d').clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        } else if (tool === 'eraser') { activeCanvas.getContext('2d').closePath(); } 
      };

      const handleDrag = (e, initVal, onUpdate) => {
          e.stopPropagation();
          const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
          const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
          const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
          const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
          const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
          
          const onMove = (moveEv) => {
              const cX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
              const cY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
              onUpdate(initVal, (cX - startX) * scaleX, (cY - startY) * scaleY);
          };
          const onUp = () => {
              window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp);
              window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp);
          };
          window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
          window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
      };

      const captureCurrentPageToDataURL = () => {
        const comp = document.createElement('canvas'); comp.width = canvasSize.w; comp.height = canvasSize.h;
        layersRef.current.forEach(layer => {
          if (layer.visible && canvasRefs.current[layer.id]) comp.getContext('2d').drawImage(canvasRefs.current[layer.id], 0, 0);
        });
        return comp.toDataURL('image/png'); // 투명 PNG (용량 극적 감소)
      };

      const saveProgressAndClose = async (status = 'in_progress') => {
        if (isReadOnly) { onClose(); return; }
        setIsSubmitting(true);
        try {
          const updatedPages = [...pages]; updatedPages[currentPageIndex] = captureCurrentPageToDataURL();
          const subData = { assignmentId: assignment.id, studentId: student.id, studentName: student.name, status: status, drawingData: updatedPages[0], pagesData: updatedPages, updatedAt: Date.now() };
          if (currentSubmissionId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentSubmissionId), subData);
          else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), subData);
          if (status === 'submitted') showAlert('제출 완료 🎉', '선생님께 무사히 전달되었습니다!');
          onClose();
        } catch (e) { showAlert('오류', '전송 실패'); setIsSubmitting(false); }
      };

      const zoomIn = () => setZoomScale(p => Math.min(p + 0.15, 3.0));
      const zoomOut = () => setZoomScale(p => Math.max(p - 0.15, 0.5));
      const fitWidth = () => { const container = containerRef.current; if (!container) return; setZoomScale(Math.min((container.clientWidth - 32) / canvasSize.w, 2.5)); };

      return (
        <div className="flex-1 w-full h-full relative overflow-hidden bg-slate-200/50 flex flex-col" ref={containerRef}>
          {/* Top Overlay Header */}
          <div className="absolute top-0 left-0 right-0 p-4 flex justify-between items-start z-[60] pointer-events-none">
            <div className="flex flex-col gap-2 pointer-events-auto">
              <button onClick={()=>saveProgressAndClose('in_progress')} className="px-5 py-2.5 bg-white hover:bg-slate-50 text-slate-700 font-black rounded-xl shadow-md text-xs border border-slate-100 transition-transform hover:-translate-y-1">← 닫기 (자동저장)</button>
              <button onClick={() => setIsToolbarOpen(!isToolbarOpen)} className="px-5 py-2.5 bg-indigo-500 text-white rounded-xl shadow-md font-black text-xs transition-transform hover:scale-105">{isToolbarOpen ? '도구 숨기기' : '도구상자 펴기'}</button>
            </div>
            <div className="pointer-events-auto flex gap-2">
              {!isReadOnly && <button onClick={()=>saveProgressAndClose('submitted')} disabled={isSubmitting} className="px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black rounded-xl shadow-lg text-xs transition-transform hover:-translate-y-1">{isSubmitting ? '전송중...' : '선생님께 제출 💯'}</button>}
            </div>
          </div>

          {/* Left Toolbar */}
          <div className={`absolute top-36 left-4 z-50 w-28 md:w-[15rem] bg-white/95 backdrop-blur-xl border border-slate-200 rounded-[2rem] shadow-2xl p-4 transition-all duration-300 origin-top-left max-h-[70vh] overflow-y-auto custom-scrollbar ${isToolbarOpen ? 'scale-100 opacity-100' : 'scale-90 opacity-0 pointer-events-none'}`}>
             {!isReadOnly ? (
               <div className="flex flex-col gap-4">
                  <div>
                    <p className="text-[10px] font-black text-slate-400 mb-1 px-1">그림 도구</p>
                    <div className="grid grid-cols-5 gap-1">
                      <button onClick={() => setTool('pen')} className={`p-2 rounded-lg flex items-center justify-center transition-all ${tool==='pen' ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}><Pencil size={15} /></button>
                      <button onClick={() => setTool('eraser')} className={`p-2 rounded-lg flex items-center justify-center transition-all ${tool==='eraser' ? 'bg-rose-100 text-rose-600' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}><Eraser size={15} /></button>
                      <button onClick={() => setTool('text')} className={`p-2 rounded-lg flex items-center justify-center transition-all ${tool==='text' ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}><Type size={15} /></button>
                      <button onClick={() => setTool('select')} className={`p-2 rounded-lg flex items-center justify-center transition-all ${tool==='select' ? 'bg-blue-100 text-blue-600' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}><Scissors size={15} /></button>
                      <button onClick={handleUndo} className="p-2 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200" title="되돌리기"><Undo2 size={15}/></button>
                    </div>
                  </div>
                  {tool === 'pen' && (
                    <select value={penType} onChange={e=>setPenType(e.target.value)} className="w-full p-2 bg-indigo-50 rounded-xl text-xs font-black text-indigo-800 outline-none">
                      <option value="pencil">✏️ 스케치 연필</option><option value="signpen">🖋️ 싸인펜</option><option value="highlighter">🔦 형광펜</option>
                    </select>
                  )}
                  {tool === 'text' && (
                    <select value={fontFamily} onChange={e=>setFontFamily(e.target.value)} className="w-full p-1.5 bg-slate-50 border rounded text-xs font-bold outline-none">
                      <option value="'Jua', sans-serif">주아체</option><option value="'Hi Melody', cursive">멜로디체</option>
                    </select>
                  )}
                  <div className="space-y-1.5 bg-slate-50 p-2 rounded-xl">
                    <span className="text-[9px] font-bold text-slate-500">굵기 {lineWidth}px</span>
                    <input type="range" min="1" max="40" value={lineWidth} onChange={e=>setLineWidth(Number(e.target.value))} className="w-full accent-indigo-500 h-1 appearance-none bg-slate-200 cursor-pointer rounded-full" />
                  </div>
                  {tool !== 'eraser' && tool !== 'select' && (
                    <div className="grid grid-cols-4 gap-1.5">
                      <div className="w-full aspect-square rounded-lg overflow-hidden relative cursor-pointer shadow bg-[conic-gradient(at_center,_#ff0000,_#ffff00,_#00ff00,_#00ffff,_#0000ff,_#ff00ff,_#ff0000)] hover:scale-105 transition-transform flex items-center justify-center">
                          <input type="color" value={color} onChange={e=>setColor(e.target.value)} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full scale-150" />
                          <Sparkles size={12} className="text-white drop-shadow-[0_1px_1px_rgba(0,0,0,0.8)] pointer-events-none" />
                      </div>
                      {['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#1e293b', '#FFFFFF'].map(c => (
                          <button key={c} onClick={() => setColor(c)} className={`w-full aspect-square rounded-lg border transition-transform ${color.toLowerCase()===c.toLowerCase()?'ring-2 ring-indigo-500 scale-105':''}`} style={{ backgroundColor: c }} />
                      ))}
                    </div>
                  )}
                  <button onClick={()=>{
                    showConfirm('지우기','이 페이지를 지울까요?',()=>{
                       pushUndoState();
                       layers.forEach(l=>{const c=canvasRefs.current[l.id]; if(c) c.getContext('2d').clearRect(0,0,canvasSize.w,canvasSize.h);});
                       setTool('pen'); 
                    });
                  }} className="w-full py-3 mt-1 bg-rose-50 text-rose-500 hover:bg-rose-100 rounded-xl text-xs font-black">전체 지우기 🧽</button>
               </div>
             ) : <div className="text-center text-xs font-black text-indigo-400">뷰어 전용 상태 👀</div>}
          </div>

          {/* Bottom Page Navigator */}
          <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-50 bg-white/90 backdrop-blur-md p-1.5 px-3 rounded-full shadow-lg border flex items-center gap-2 pointer-events-auto">
            <button onClick={() => { setPages(p=>{const u=[...p]; u[currentPageIndex]=captureCurrentPageToDataURL(); return u;}); setCurrentPageIndex(p=>p-1); }} disabled={currentPageIndex === 0} className="p-2 hover:bg-slate-100 rounded-full disabled:opacity-30"><ChevronLeft size={18}/></button>
            <span className="text-xs font-black w-10 text-center">{currentPageIndex + 1}/{pages.length}</span>
            <button onClick={() => { setPages(p=>{const u=[...p]; u[currentPageIndex]=captureCurrentPageToDataURL(); return u;}); setCurrentPageIndex(p=>p+1); }} disabled={currentPageIndex === pages.length - 1} className="p-2 hover:bg-slate-100 rounded-full disabled:opacity-30"><ChevronRight size={18}/></button>
            <div className="h-4 w-px bg-slate-200 mx-1" />
            <button onClick={() => { setPages(p=>{const u=[...p]; u[currentPageIndex]=captureCurrentPageToDataURL(); u.push(''); return u;}); setCurrentPageIndex(pages.length); }} className="px-3 py-1.5 bg-indigo-500 text-white rounded-full text-[10px] font-black">쪽수 추가</button>
          </div>

          {/* Canvas Workspace */}
          <div className="flex-1 w-full overflow-auto flex flex-col items-center p-4 relative animate-fade-in bg-slate-200/50" style={{ minHeight: 0 }}>
             <div className="absolute bottom-8 right-8 z-50 bg-white/90 backdrop-blur-xl p-2 rounded-full shadow-2xl border flex items-center gap-1 pointer-events-auto">
                <button onClick={zoomIn} className="p-3 hover:bg-slate-100 text-slate-600 rounded-full" title="크게"><ZoomIn size={18}/></button>
                <span className="text-xs font-black text-indigo-600 px-2 w-12 text-center bg-indigo-50 py-1 rounded-full">{Math.round(zoomScale * 100)}%</span>
                <button onClick={zoomOut} className="p-3 hover:bg-slate-100 text-slate-600 rounded-full" title="작게"><ZoomOut size={18}/></button>
                <div className="h-6 w-1 bg-slate-100 rounded-full mx-1" />
                <button onClick={fitWidth} className="p-3 bg-indigo-100 text-indigo-600 hover:bg-indigo-200 rounded-full flex items-center justify-center" title="꽉차게"><Maximize2 size={16}/></button>
             </div>

             <div 
               ref={canvasContainerRef}
               className="relative shadow-2xl rounded-2xl bg-white origin-center my-auto shrink-0 border border-slate-100" 
               style={{ width: canvasSize.w, height: canvasSize.h, transform: `scale(${zoomScale})` }}
             >
                {/* 배경 이미지 레이어 */}
                {bgImages[currentPageIndex] ? (
                   <img src={bgImages[currentPageIndex]} className="absolute inset-0 w-full h-full object-contain pointer-events-none rounded-2xl" alt="배경" />
                ) : (
                   <div className="absolute inset-0 w-full h-full pointer-events-none rounded-2xl bg-white" style={{ backgroundImage: 'linear-gradient(#f1f5f9 1px, transparent 1px), linear-gradient(90deg, #f1f5f9 1px, transparent 1px)', backgroundSize: '40px 40px' }} />
                )}

                {/* 필기 전용 레이어 */}
                {layers.map((layer) => (
                    <canvas
                      key={layer.id}
                      ref={el => { if (el) { if(el.width!==canvasSize.w) el.width=canvasSize.w; if(el.height!==canvasSize.h) el.height=canvasSize.h; canvasRefs.current[layer.id] = el; } }}
                      onPointerDown={layer.id === activeLayerId ? startDrawing : null}
                      onPointerMove={layer.id === activeLayerId ? draw : null}
                      onPointerUp={layer.id === activeLayerId ? stopDrawing : null}
                      onPointerOut={layer.id === activeLayerId ? stopDrawing : null}
                      className="absolute top-0 left-0 w-full h-full rounded-2xl"
                      style={{ zIndex: layer.zIndex, pointerEvents: (layer.id === activeLayerId && !isReadOnly) ? 'auto' : 'none', touchAction: 'none' }}
                    />
                ))}

                <canvas ref={previewCanvasRef} width={canvasSize.w} height={canvasSize.h} className="absolute top-0 left-0 w-full h-full pointer-events-none rounded-2xl" style={{ zIndex: 99, opacity: (isDrawing && tool === 'pen') ? getActiveAlpha() : 1 }} />

                {/* 올가미 및 투명 셀렉션 */}
                {activeSelection && tool === 'select' && (
                   <div className="absolute z-50 border-2 border-indigo-500 border-dashed touch-none bg-indigo-500/10 rounded-lg shadow-sm" style={{ left: activeSelection.x, top: activeSelection.y, width: activeSelection.w, height: activeSelection.h }} onPointerDown={e=>e.stopPropagation()}>
                       <img src={activeSelection.dataUrl} alt="선택" className="w-full h-full pointer-events-none opacity-80" />
                       <div className="absolute inset-0 cursor-move" onPointerDown={e => handleDrag(e, {x: activeSelection.x, y: activeSelection.y}, (init, dx, dy) => setActiveSelection(p => ({...p, x: init.x + dx, y: init.y + dy})))} />
                       <div className="absolute -bottom-14 left-1/2 -translate-x-1/2 flex gap-2">
                           <button onClick={(e)=>{e.stopPropagation(); setActiveSelection(null); setTool('pen');}} className="w-10 h-10 bg-rose-500 rounded-full text-white flex items-center justify-center border border-white"><Trash2 size={16}/></button>
                           <button onClick={(e)=>{
                               e.stopPropagation(); const activeCanvas = canvasRefs.current[activeLayerId]; if (!activeCanvas) return;
                               const ctx = activeCanvas.getContext('2d'); const img = new Image();
                               img.onload = () => { ctx.drawImage(img, activeSelection.x, activeSelection.y, activeSelection.w, activeSelection.h); setActiveSelection(null); setTool('pen'); };
                               img.src = activeSelection.dataUrl;
                           }} className="px-4 h-10 bg-indigo-500 rounded-full font-black text-white flex items-center justify-center border-2 border-white whitespace-nowrap"><Check size={14}/> 배치 완료</button>
                       </div>
                   </div>
                )}

                {/* 텍스트 입력 창 */}
                {activeText && tool === 'text' && (
                   <div className="absolute z-50 flex flex-col border-2 border-amber-400 border-dashed bg-amber-50/40 p-1" style={{ left: activeText.x, top: activeText.y }} onPointerDown={e=>e.stopPropagation()}>
                      <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-amber-500 text-white text-[11px] px-4 py-1 rounded-full cursor-move shadow-md" onPointerDown={e => handleDrag(e, {x: activeText.x, y: activeText.y}, (init, dx, dy) => setActiveText(p => ({...p, x: init.x + dx, y: init.y + dy})))}>이동</div>
                      <textarea autoFocus value={activeText.text} onChange={e=>setActiveText(p=>({...p, text:e.target.value}))} className="bg-transparent outline-none resize-both min-h-[50px] p-2"
                         style={{ fontFamily, fontSize: `${lineWidth*2+10}px`, color, fontWeight: textStyle.bold?'900':'400', fontStyle: textStyle.italic?'italic':'normal' }}
                         onInput={e=>{e.target.style.height='auto'; e.target.style.height=e.target.scrollHeight+'px';}}
                      />
                      <button onClick={()=>{
                        const ctx = canvasRefs.current[activeLayerId].getContext('2d');
                        pushUndoState(); ctx.save(); ctx.globalAlpha = opacity; ctx.fillStyle = color; ctx.textBaseline = 'top';
                        const fs = lineWidth*2+10; ctx.font = `${textStyle.italic?'italic':'normal'} ${textStyle.bold?'900':'400'} ${fs}px ${fontFamily}`;
                        const lines = activeText.text.split('\n'); let cY = activeText.y + 8;
                        lines.forEach(l => { ctx.fillText(l, activeText.x+8, cY); cY += fs*1.4; });
                        ctx.restore(); setActiveText(null); 
                      }} className="px-4 py-1.5 bg-emerald-500 text-white font-bold text-xs mt-1 rounded-lg shadow">입력완료</button>
                   </div>
                )}
             </div>
          </div>
        </div>
      )
    }

    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = createRoot(rootElement);
      root.render(<App />);
    }
  </script>
</body>
</html>
