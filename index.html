           return;
        }

        if (tool === 'pen') {
          const pCtx = previewCanvas.getContext('2d');
          applyContextStyle(pCtx, false, true); 
          
          if (e.pointerType === 'pen' && e.pressure) {
              pCtx.lineWidth = pCtx.lineWidth * (0.5 + e.pressure);
          }
          pCtx.beginPath();
          pCtx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
          pCtx.lineTo(x, y);
          pCtx.stroke();
          lastPosRef.current = { x, y };

        } else if (tool === 'eraser') {
          const lCtx = activeCanvas.getContext('2d');
          lCtx.lineTo(x, y);
          lCtx.stroke();
          lCtx.beginPath();
          lCtx.moveTo(x, y);
        }
        else if (tool === 'line' || tool === 'curve' || tool === 'wave') {
          const pCtx = previewCanvas.getContext('2d');
          pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
          applyContextStyle(pCtx, false);
          const sX = drawStartCoords.x; const sY = drawStartCoords.y;

          if (tool === 'line') { pCtx.beginPath(); pCtx.moveTo(sX, sY); pCtx.lineTo(x, y); pCtx.stroke(); } 
          else if (tool === 'curve') {
            const midX = (sX + x) / 2; const midY = (sY + y) / 2;
            pCtx.beginPath(); pCtx.moveTo(sX, sY); pCtx.quadraticCurveTo(midX - (y - sY) * 0.18, midY + (x - sX) * 0.18, x, y); pCtx.stroke();
          } 
          else if (tool === 'wave') {
            const dx = x - sX; const dy = y - sY; const len = Math.sqrt(dx * dx + dy * dy); const angle = Math.atan2(dy, dx);
            pCtx.save(); pCtx.translate(sX, sY); pCtx.rotate(angle); pCtx.beginPath();
            for (let ix = 0; ix <= len; ix++) {
              const iy = Math.sin(ix * 0.08) * 8;
              if (ix === 0) pCtx.moveTo(ix, iy); else pCtx.lineTo(ix, iy);
            }
            pCtx.stroke(); pCtx.restore();
          }
        }
      };

      const stopDrawing = (e) => {
        if (!isDrawing) return;
        setIsDrawing(false);

        const activeCanvas = canvasRefs.current[activeLayerId];
        const previewCanvas = previewCanvasRef.current;
        if (!activeCanvas || !previewCanvas) return;

        const { x, y } = getCoordinates(e);

        if (tool === 'select') {
            const endX = x; const endY = y;
            const sX = drawStartCoords.x; const sY = drawStartCoords.y;
            const rectX = Math.min(sX, endX); const rectY = Math.min(sY, endY);
            const rectW = Math.abs(endX - sX); const rectH = Math.abs(endY - sY);

            if (rectW > 10 && rectH > 10) {
                pushUndoState();
                const lCtx = activeCanvas.getContext('2d');
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = rectW; tempCanvas.height = rectH;
                const tCtx = tempCanvas.getContext('2d');
                
                tCtx.putImageData(lCtx.getImageData(rectX, rectY, rectW, rectH), 0, 0);
                setActiveSelection({ x: rectX, y: rectY, w: rectW, h: rectH, dataUrl: tempCanvas.toDataURL() });

                lCtx.clearRect(rectX, rectY, rectW, rectH);
            }
            previewCanvas.getContext('2d').clearRect(0,0, previewCanvas.width, previewCanvas.height);
            return;
        }

        if (tool === 'pen') { 
            const lCtx = activeCanvas.getContext('2d');
            lCtx.save();
            lCtx.globalAlpha = getActiveAlpha();
            lCtx.globalCompositeOperation = 'source-over';
            lCtx.drawImage(previewCanvas, 0, 0);
            lCtx.restore();
            
            previewCanvas.getContext('2d').clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        } 
        else if (tool === 'eraser') { activeCanvas.getContext('2d').closePath(); } 
        else if (tool === 'line' || tool === 'curve' || tool === 'wave') {
          const lCtx = activeCanvas.getContext('2d');
          const pCtx = previewCanvas.getContext('2d');
          pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
          applyContextStyle(lCtx, false);
          const sX = drawStartCoords.x; const sY = drawStartCoords.y;

          if (tool === 'line') { lCtx.beginPath(); lCtx.moveTo(sX, sY); lCtx.lineTo(x, y); lCtx.stroke(); } 
          else if (tool === 'curve') {
            const midX = (sX + x) / 2; const midY = (sY + y) / 2;
            lCtx.beginPath(); lCtx.moveTo(sX, sY); lCtx.quadraticCurveTo(midX - (y - sY) * 0.18, midY + (x - sX) * 0.18, x, y); lCtx.stroke();
          } 
          else if (tool === 'wave') {
            const dx = x - sX; const dy = y - sY; const len = Math.sqrt(dx * dx + dy * dy); const angle = Math.atan2(dy, dx);
            lCtx.save(); lCtx.translate(sX, sY); lCtx.rotate(angle); lCtx.beginPath();
            for (let ix = 0; ix <= len; ix++) {
              const iy = Math.sin(ix * 0.08) * 8;
              if (ix === 0) lCtx.moveTo(ix, iy); else lCtx.lineTo(ix, iy);
            }
            lCtx.stroke(); lCtx.restore();
          }
        }
        saveProgress('in_progress');
      };

      const handleClearTrigger = () => {
        showConfirm('도화지 깨끗하게 지우기 🧽', `현재 [Page ${currentPageIndex + 1}]에 그린 그림과 글씨를 모두 깨끗하게 지울까요?`, () => {
          pushUndoState();
          layersRef.current.forEach(layer => {
            if (layer.id === 'base') return;
            const canvas = canvasRefs.current[layer.id];
            if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
          });
          setTool('pen');
          saveProgressWithLayers(layersRef.current, 'in_progress');
        });
      };

      const saveProgressWithLayers = async (targetLayers, status = 'in_progress') => {
        if (isReadOnly) return;
        if (status === 'submitted') setIsSubmitting(true);
        
        try {
          const compositeCanvas = document.createElement('canvas');
          compositeCanvas.width = canvasSize.w; compositeCanvas.height = canvasSize.h;
          const compCtx = compositeCanvas.getContext('2d');

          // 🎨 학생 필기 내용만 '투명 PNG'로 저장 (학습지 배경은 조회 시점에 별도 합성 → 재제출 편집 호환)
          targetLayers.forEach(layer => {
            if (layer.id === 'base') return; 
            if (layer.visible && canvasRefs.current[layer.id]) compCtx.drawImage(canvasRefs.current[layer.id], 0, 0);
          });

          const dataUrl = compositeCanvas.toDataURL('image/png'); 
          const updatedPages = [...pages];
          updatedPages[currentPageIndex] = dataUrl;
          setPages(updatedPages);

          const subData = {
            assignmentId: assignment.id, studentId: student.id, studentName: student.name, status: status,
            drawingData: updatedPages[0], pagesData: updatedPages, updatedAt: Date.now(),
            studentRefImageUrl: studentRefImageUrlRef.current, studentRefVideoUrl: studentRefVideoUrlRef.current,
            studentRefLinkUrl: studentRefLinkUrlRef.current, studentFileType: studentFileTypeRef.current, studentFileName: studentFileNameRef.current
          };

          const subId = currentSubmissionIdRef.current;
          if (subId) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', subId), subData); } 
          else {
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), subData);
            setCurrentSubmissionId(docRef.id);
          }
          if (status === 'submitted') { showAlert('제출 성공 🎉', '선생님께 과제 제출이 완료되었어요! 수고했어요!'); onClose(); }
        } catch (e) {
          console.error(e);
          if (status === 'submitted') showAlert('앗!', '제출하는 도중 문제가 생겼어요. 다시 시도해주세요.');
        } finally { setIsSubmitting(false); }
      };

      const saveProgress = (status = 'in_progress') => saveProgressWithLayers(layersRef.current, status);

      const handleStudentImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          // 용량 최적화 압축 업로드 적용
          compressImage(URL.createObjectURL(file), (compressedUrl) => setStudentRefImageUrl(compressedUrl));
        }
      };

      const handleShapeSelect = (type) => {
          setTool('shape');
          setActiveShape({ type, x: canvasSize.w / 2 - 100, y: canvasSize.h / 2 - 100, w: 200, h: 200 });
          if (window.innerWidth < 768) setIsToolbarOpen(false);
      };

      const stampShape = () => {
          const activeCanvas = canvasRefs.current[activeLayerId];
          if (!activeCanvas || !activeShape) return;
          pushUndoState();
          const lCtx = activeCanvas.getContext('2d');

          lCtx.save(); lCtx.globalCompositeOperation = 'source-over'; lCtx.strokeStyle = color; lCtx.fillStyle = color; lCtx.lineWidth = lineWidth; lCtx.lineCap = 'round'; lCtx.lineJoin = 'round'; lCtx.shadowBlur = 0; lCtx.globalAlpha = opacity; 
          
          lCtx.beginPath();
          const { x, y, w, h, type } = activeShape;
          
          if (type === 'rect') { lCtx.rect(x, y, w, h); } 
          else if (type === 'circle') { lCtx.ellipse(x + w/2, y + h/2, Math.max(w/2, 0.1), Math.max(h/2, 0.1), 0, 0, Math.PI*2); } 
          else if (type === 'triangle') { lCtx.moveTo(x + w/2, y); lCtx.lineTo(x + w, y + h); lCtx.lineTo(x, y + h); lCtx.closePath(); }

          if (fillShape) lCtx.fill();
          lCtx.stroke(); lCtx.restore();
          
          setActiveShape(null); setTool('pen'); saveProgress('in_progress');
      };

      const zoomIn = () => setZoomScale(prev => Math.min(prev + 0.15, 3.0));
      const zoomOut = () => setZoomScale(prev => Math.max(prev - 0.15, 0.5));
      const resetZoom = () => setZoomScale(1.0);
      const fitWidth = () => {
        const container = containerRef.current;
        if (!container) return;
        setZoomScale(Math.min((container.clientWidth - 32) / canvasSize.w, 2.5));
      };

      // 🤏 [핀치 줌] 두 손가락 오므리면 축소, 벌리면 확대. 두 손가락 이상이 닿았을 때는
      // isMultiTouchRef를 true로 만들어 startDrawing에서 그림 그리기를 skip → 핀치 중 오작동 방지.
      // zoomScale은 ref로 읽어 effect 재등록을 피함.
      const isMultiTouchRef = useRef(false);
      const zoomScaleRef = useRef(zoomScale);
      useEffect(() => { zoomScaleRef.current = zoomScale; }, [zoomScale]);
      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;

        let pinchStartDist = 0;
        let pinchStartScale = 1;
        let isPinching = false;

        const getDist = (touches) => {
          const dx = touches[0].clientX - touches[1].clientX;
          const dy = touches[0].clientY - touches[1].clientY;
          return Math.hypot(dx, dy);
        };

        const onTouchStart = (e) => {
          if (e.touches.length >= 2) {
            isMultiTouchRef.current = true;
            isPinching = true;
            pinchStartDist = getDist(e.touches);
            pinchStartScale = zoomScaleRef.current;
            // 진행 중이던 그리기를 즉시 중단
            setIsDrawing(false);
            e.preventDefault();
          }
        };
        const onTouchMove = (e) => {
          if (isPinching && e.touches.length >= 2) {
            const d = getDist(e.touches);
            if (pinchStartDist > 0) {
              const ratio = d / pinchStartDist;
              const next = Math.max(0.5, Math.min(3.0, pinchStartScale * ratio));
              setZoomScale(next);
            }
            e.preventDefault();
          }
        };
        const onTouchEnd = (e) => {
          if (e.touches.length < 2) {
            isPinching = false;
            // 마지막 손가락까지 떨어지면 멀티터치 상태 해제
            if (e.touches.length === 0) isMultiTouchRef.current = false;
          }
        };

        container.addEventListener('touchstart', onTouchStart, { passive: false });
        container.addEventListener('touchmove', onTouchMove, { passive: false });
        container.addEventListener('touchend', onTouchEnd);
        container.addEventListener('touchcancel', onTouchEnd);
        return () => {
          container.removeEventListener('touchstart', onTouchStart);
          container.removeEventListener('touchmove', onTouchMove);
          container.removeEventListener('touchend', onTouchEnd);
          container.removeEventListener('touchcancel', onTouchEnd);
        };
      }, []);

      const handleCloseTrigger = async () => { 
        setIsSubmitting(true);
        await saveProgress('in_progress'); 
        onClose(); 
      };

      const hasRefMaterials = assignment.refImageUrl || assignment.refVideoUrl || assignment.refLinkUrl;
      const isLineToolActive = tool === 'line' || tool === 'curve' || tool === 'wave';

      return (
        <div className="flex-1 w-full h-full relative overflow-hidden bg-slate-200/50 flex flex-col" ref={containerRef}>
          
          {/* 1. TOP OVERLAY : Header & Submit Button */}
          <div className="absolute top-0 left-0 right-0 p-5 flex justify-between items-start z-[60] pointer-events-none">
            <div className="flex flex-col gap-3 pointer-events-auto">
                {assignment.isPractice ? (
                  <button onClick={handleCloseTrigger} className="px-5 py-3 bg-white hover:bg-slate-50 text-indigo-600 font-black rounded-3xl shadow-xl flex items-center gap-2 border-4 border-indigo-100 text-sm transition-all hover:-translate-y-1">
                      ← 닫기 (자동 저장)
                  </button>
                ) : (
                  <button onClick={handleCloseTrigger} className="px-5 py-3 bg-white hover:bg-slate-50 text-slate-700 font-black rounded-3xl shadow-xl flex items-center gap-2 border-4 border-white text-sm transition-all hover:-translate-y-1">
                      ← 나중에 이어서 하기
                  </button>
                )}
                <div className="flex gap-2">
                  <button onClick={() => setIsToolbarOpen(!isToolbarOpen)} className="px-4 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-2xl shadow-xl flex items-center gap-2 font-black text-sm transition-all hover:scale-105 border-b-4 border-indigo-700">
                      {isToolbarOpen ? <X size={18}/> : <Menu size={18}/>}
                      {isToolbarOpen ? '숨기기' : '도구상자'}
                  </button>
                  {hasRefMaterials && (
                    <button onClick={() => setIsRefOpen(!isRefOpen)} className={`px-4 py-3 rounded-2xl shadow-xl flex items-center gap-2 font-black text-sm transition-all hover:scale-105 border-b-4 ${isRefOpen ? 'bg-amber-400 text-white border-amber-500' : 'bg-white text-slate-700 border-slate-200'}`}>
                      <Lightbulb size={18} className={isRefOpen ? "animate-bounce text-white" : "text-amber-500"}/> 힌트 보기
                    </button>
                  )}
                </div>
            </div>

            <div className="flex flex-col items-end gap-3 pointer-events-auto">
                {!isReadOnly && (
                    <div className="px-4 py-2 bg-white/80 backdrop-blur-md rounded-full text-indigo-600 font-black text-xs shadow-sm border border-white animate-pulse">
                        ✨ 스윽삭 자동으로 저장되는 중...
                    </div>
                )}
                <div className="flex gap-2">
                    {!isReadOnly && !assignment.isPractice && (
                        <button onClick={() => setIsAttachModalOpen(true)} className="px-5 py-3.5 bg-white text-teal-600 hover:bg-teal-50 font-black rounded-3xl shadow-xl flex items-center gap-2 transition-all text-sm border-4 border-teal-100 hover:-translate-y-1">
                          <Paperclip size={18} /> 자료 첨부하기 📎
                          {(studentRefImageUrl || studentRefVideoUrl || studentRefLinkUrl || studentFileType !== 'none') && (
                            <span className="w-3 h-3 bg-rose-500 rounded-full animate-ping shadow-sm"></span>
                          )}
                        </button>
                    )}
                    {!isReadOnly ? (
                        assignment.isPractice ? (
                          <div className="px-6 py-3.5 bg-gradient-to-r from-amber-400 to-orange-400 text-white font-black rounded-3xl shadow-xl flex items-center gap-2 text-sm border-2 border-white shadow-amber-200">
                            📒 열심히 연습하는 중!
                          </div>
                        ) : (
                          <button onClick={() => saveProgress('submitted')} disabled={isSubmitting} className="px-6 py-3.5 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-black rounded-3xl shadow-xl flex items-center gap-2 text-sm transition-all disabled:opacity-50 border-2 border-white shadow-indigo-200 hover:-translate-y-1">
                            {isSubmitting ? '슈웅 날아가는 중 🚀' : <><Send size={18} /> 선생님께 제출하기 💯</>}
                          </button>
                        )
                    ) : (
                        <div className="px-6 py-3.5 bg-emerald-100 text-emerald-700 font-black rounded-3xl shadow-lg flex items-center gap-2 text-sm border-4 border-white">
                            <Check size={18} strokeWidth={3} /> 제출 완료! 참 잘했어요 ⭐️
                        </div>
                    )}
                </div>
            </div>
          </div>

          {/* 2. TOOLBAR PANEL */}
          <div className={`absolute top-40 left-5 z-50 w-28 md:w-[18rem] bg-white/90 backdrop-blur-xl border-4 border-indigo-50/50 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] p-5 transition-all duration-300 origin-top-left max-h-[75vh] overflow-y-auto custom-scrollbar ${isToolbarOpen ? 'scale-100 opacity-100' : 'scale-90 opacity-0 pointer-events-none'}`}>
             {!isReadOnly ? (
                 <div className="flex flex-col gap-4">
                    
                    {/* S-Pen Filter Toggle */}
                    <div>
                       <p className="text-[11px] font-black text-slate-400 mb-2 px-1">손 터치 방지 모드 🖐️</p>
                       <div className="flex bg-slate-100 p-1 rounded-2xl gap-1">
                          <button onClick={() => setInputMode('pen')} className={`flex-1 py-2 rounded-xl text-[11px] font-black transition-all ${inputMode === 'pen' ? 'bg-indigo-500 text-white shadow-md' : 'text-slate-500 hover:bg-slate-200'}`}>✍️ S펜만</button>
                          <button onClick={() => setInputMode('all')} className={`flex-1 py-2 rounded-xl text-[11px] font-black transition-all ${inputMode === 'all' ? 'bg-indigo-500 text-white shadow-md' : 'text-slate-500 hover:bg-slate-200'}`}>🙌 둘 다</button>
                       </div>
                    </div>

                    <div className="w-full border-t-2 border-dashed border-slate-100"></div>

                    {/* Basic Tools */}
                    <div>
                       <p className="text-[11px] font-black text-slate-400 mb-2 px-1">그림 도구상자 🎒</p>
                       <div className="grid grid-cols-6 gap-1">
                          <button onClick={() => setTool('pen')} className={`p-2 rounded-xl flex flex-col items-center justify-center gap-1 transition-all border-b-4 ${tool === 'pen' ? 'bg-indigo-100 text-indigo-600 border-indigo-200 -translate-y-1' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}`} title="그리기">
                             <Pencil size={18} strokeWidth={2.5} />
                          </button>
                          <button onClick={() => setTool('eraser')} className={`p-2 rounded-xl flex flex-col items-center justify-center gap-1 transition-all border-b-4 ${tool === 'eraser' ? 'bg-rose-100 text-rose-600 border-rose-200 -translate-y-1' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}`} title="지우개">
                             <Eraser size={18} strokeWidth={2.5} />
                          </button>
                          <button onClick={() => setTool('paintbucket')} className={`p-2 rounded-xl flex flex-col items-center justify-center gap-1 transition-all border-b-4 ${tool === 'paintbucket' ? 'bg-teal-100 text-teal-600 border-teal-200 -translate-y-1' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}`} title="영역 꽉 채우기">
                             <PaintBucket size={18} strokeWidth={2.5} />
                          </button>
                          <button onClick={() => setTool('text')} className={`p-2 rounded-xl flex flex-col items-center justify-center gap-1 transition-all border-b-4 ${tool === 'text' ? 'bg-amber-100 text-amber-600 border-amber-200 -translate-y-1' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}`} title="글씨 쓰기">
                             <Type size={18} strokeWidth={3} />
                          </button>
                          <button onClick={() => setTool('select')} className={`p-2 rounded-xl flex flex-col items-center justify-center gap-1 transition-all border-b-4 ${tool === 'select' ? 'bg-indigo-500 text-white border-indigo-700 -translate-y-1' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}`} title="잘라내서 옮기기 (올가미)">
                             <Scissors size={18} strokeWidth={2.5} />
                          </button>
                          <button onClick={handleUndo} className={`p-2 rounded-xl flex flex-col items-center justify-center gap-1 transition-all border-b-4 bg-slate-100 text-slate-600 border-slate-200 hover:bg-slate-200 active:translate-y-1 shadow-sm`} title="방금 전으로 되돌리기">
                             <Undo2 size={18} strokeWidth={3} />
                          </button>
                       </div>
                    </div>

                    {/* Intelligent Lines Selection */}
                    <div>
                       <div className="grid grid-cols-3 gap-2">
                          <button onClick={() => setTool('line')} className={`py-2 px-1 rounded-xl text-[11px] font-black transition-all border-b-4 ${tool === 'line' ? 'bg-purple-100 text-purple-600 border-purple-200 -translate-y-1' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}`}>📏 직선</button>
                          <button onClick={() => setTool('curve')} className={`py-2 px-1 rounded-xl text-[11px] font-black transition-all border-b-4 ${tool === 'curve' ? 'bg-purple-100 text-purple-600 border-purple-200 -translate-y-1' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}`}>🌙 곡선</button>
                          <button onClick={() => setTool('wave')} className={`py-2 px-1 rounded-xl text-[11px] font-black transition-all border-b-4 ${tool === 'wave' ? 'bg-purple-100 text-purple-600 border-purple-200 -translate-y-1' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}`}>〰️ 물결</button>
                       </div>
                    </div>

                    {/* Text Styling Setup */}
                    {tool === 'text' && (
                      <div className="animate-fade-in-down bg-amber-50/50 p-3 rounded-2xl border-2 border-amber-100 space-y-3">
                         <p className="text-[10px] font-black text-amber-600 mb-1 px-1">가나다 글꼴 설정 🔤</p>
                         <select value={fontFamily} onChange={(e) => setFontFamily(e.target.value)} className="w-full p-2 bg-white border-2 border-amber-100 rounded-xl text-xs font-black text-slate-700 outline-none focus:border-amber-300">
                           <option value="'Jua', sans-serif">동글동글 주아체 (Jua)</option>
                           <option value="'Hi Melody', cursive">귀여운 멜로디 (Hi Melody)</option>
                           <option value="'Gowun Dodum', sans-serif">단정한 돋움 (Gowun)</option>

               📌 [하단 도구 바 여백] 고정된 하단 바 뒤로 캔버스 마지막 부분이 가려지지 않도록 padding-bottom 확보 */}
          <div className="flex-1 w-full overflow-auto flex flex-col items-center p-4 relative animate-fade-in bg-slate-200/50" style={{ minHeight: 0, paddingBottom: '96px' }}>
             
             {/* 📌 [하단 도구 바 화면 고정] absolute → fixed 로 변경.
                 캔버스 스크롤 컨테이너와 무관하게 뷰포트 하단에 항상 붙어있도록 함.
                 - z-50 유지: 캔버스/스크롤바 위에 항상 노출
                 - bottom을 env(safe-area-inset-bottom) 만큼 여유 → 태블릿 하단 시스템 UI와 겹침 방지
                 - pointer-events-auto: 부모의 이벤트 통과 옵션과 무관하게 클릭 수신 */}
             <div className="fixed right-4 z-50 bg-white/90 backdrop-blur-xl p-2 rounded-full shadow-2xl border-4 border-white flex items-center gap-1 pointer-events-auto transition-transform hover:scale-105" style={{ bottom: 'calc(16px + env(safe-area-inset-bottom, 0px))' }}>
                <button onClick={zoomIn} className="p-3 hover:bg-slate-100 text-slate-600 rounded-full transition-colors" title="크게 보기"><ZoomIn size={20} strokeWidth={2.5}/></button>
                <span className="text-xs font-black text-indigo-600 px-2 w-12 text-center bg-indigo-50 py-1 rounded-full">{Math.round(zoomScale * 100)}%</span>
                <button onClick={zoomOut} className="p-3 hover:bg-slate-100 text-slate-600 rounded-full transition-colors" title="작게 보기"><ZoomOut size={20} strokeWidth={2.5}/></button>
                <div className="h-6 w-1 bg-slate-100 rounded-full mx-1" />
                <button onClick={fitWidth} className="p-3 bg-indigo-100 text-indigo-600 hover:bg-indigo-200 rounded-full transition-colors flex items-center justify-center" title="화면 꽉 채우기"><Maximize2 size={18} strokeWidth={3}/></button>
                <button onClick={resetZoom} className="p-3 hover:bg-slate-100 text-slate-400 rounded-full transition-colors flex items-center justify-center" title="원래대로"><RotateCcw size={18} strokeWidth={3}/></button>
             </div>

             <div className="fixed left-1/2 -translate-x-1/2 z-50 bg-white/90 backdrop-blur-xl p-2 px-3 rounded-full shadow-2xl border-4 border-white flex items-center gap-3 pointer-events-auto transition-transform hover:scale-105" style={{ bottom: 'calc(16px + env(safe-area-inset-bottom, 0px))' }}>
                <button onClick={() => changePage(currentPageIndex - 1)} disabled={currentPageIndex === 0} className="p-2 text-slate-600 hover:bg-slate-100 rounded-full disabled:opacity-20 transition-colors"><ChevronLeft size={24} strokeWidth={3}/></button>
                <span className="text-sm font-black text-slate-700 w-16 text-center select-none bg-slate-100 py-1.5 rounded-full">
                  {currentPageIndex + 1} <span className="text-slate-400 mx-1">/</span> {pages.length}
                </span>
                <button onClick={() => changePage(currentPageIndex + 1)} disabled={currentPageIndex === pages.length - 1} className="p-2 text-slate-600 hover:bg-slate-100 rounded-full disabled:opacity-20 transition-colors"><ChevronRight size={24} strokeWidth={3}/></button>
                <div className="h-6 w-1 bg-slate-100 rounded-full mx-1" />
                <button onClick={addNewPage} className="flex items-center gap-1.5 px-5 py-2.5 bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 text-white rounded-full text-xs font-black transition-all shadow-md shadow-blue-200">
                  <Plus size={16} strokeWidth={3}/> 새 도화지 추가
                </button>
             </div>

             {/* Scalable Absolute Stack Canvas wrapper 
                 🔍 [스크롤 개선] transform:scale() 대신 실제 width/height를 확장해서
                 부모의 overflow-auto가 자연스럽게 스크롤을 활성화하도록 변경.
                 zoomScale이 커지면 wrapper가 뷰포트보다 커져 상하좌우 스크롤 가능.
                 캔버스 내부는 w-full h-full로 wrapper에 꽉 차게 스트레치. */}
             <div 
               ref={canvasContainerRef}
               className="relative shadow-2xl rounded-2xl bg-white transition-[width,height] duration-100 ease-out my-auto shrink-0 border border-slate-100" 
               style={{ 
                 width: canvasSize.w * zoomScale, 
                 height: canvasSize.h * zoomScale,
                 imageRendering: 'auto'
               }}
             >
                <canvas ref={el => canvasRefs.current['base'] = el} width={canvasSize.w} height={canvasSize.h} className="absolute top-0 left-0 w-full h-full rounded-2xl" style={{ zIndex: 1, visibility: layers.find(l => l.id === 'base')?.visible ? 'visible' : 'hidden' }} />

                {layers.map((layer) => {
                  if (layer.id === 'base') return null;
                  return (
                    <canvas
                      key={layer.id}
                      ref={el => {
                        if (el) {
                          if (el.width !== canvasSize.w || el.height !== canvasSize.h) { el.width = canvasSize.w; el.height = canvasSize.h; }
                          canvasRefs.current[layer.id] = el;
                        }
                      }}
                      onPointerDown={layer.id === activeLayerId ? startDrawing : null}
                      onPointerMove={layer.id === activeLayerId ? draw : null}
                      onPointerUp={layer.id === activeLayerId ? stopDrawing : null}
                      onPointerOut={layer.id === activeLayerId ? stopDrawing : null}
                      className={`absolute top-0 left-0 w-full h-full rounded-2xl ${layer.id === activeLayerId ? (tool === 'select' || tool === 'shape' ? 'cursor-crosshair' : 'cursor-default') : ''}`}
                      style={{ zIndex: layer.zIndex, visibility: layer.visible ? 'visible' : 'hidden', pointerEvents: (layer.id === activeLayerId && !isReadOnly) ? 'auto' : 'none', touchAction: 'none' }}
                    />
                  );
                })}

                <canvas 
                   ref={previewCanvasRef} 
                   width={canvasSize.w} 
                   height={canvasSize.h} 
                   className="absolute top-0 left-0 w-full h-full pointer-events-none rounded-2xl" 
                   style={{ zIndex: 99, opacity: (isDrawing && tool === 'pen') ? getActiveAlpha() : 1 }} 
                />

                {/* ✂️ 손바닥(올가미) 도구 에디터 오버레이 (선택 영역 이동) */}
                {activeSelection && tool === 'select' && (
                   <div className="absolute z-50 border-2 border-indigo-500 border-dashed touch-none group bg-indigo-500/10 rounded-lg shadow-sm"
                        style={{ left: activeSelection.x, top: activeSelection.y, width: activeSelection.w, height: activeSelection.h }}
                        onPointerDown={(e) => e.stopPropagation()}
                   >
                       <img src={activeSelection.dataUrl} alt="선택영역" className="w-full h-full pointer-events-none opacity-80" />

                       <div className="absolute inset-0 cursor-move"
                          onPointerDown={(e) => {
                              e.stopPropagation();
                              const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
                              const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                              const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                              const initX = activeSelection.x; const initY = activeSelection.y;
                              const onMove = (moveEv) => {
                                  const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
                                  const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
                                  const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                  const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                  setActiveSelection(prev => ({ ...prev, x: initX + (clientX - startX) * scaleX, y: initY + (clientY - startY) * scaleY }));
                              };
                              const onUp = () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                              window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                              window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                          }}
                       />
                       <div className="absolute -bottom-14 left-1/2 -translate-x-1/2 flex gap-2">
                           <button onClick={(e)=>{e.stopPropagation(); setActiveSelection(null); setTool('pen'); saveProgress('in_progress');}} className="w-10 h-10 bg-rose-500 rounded-full text-white flex items-center justify-center shadow-lg hover:bg-rose-600 transition-all border-2 border-white" title="이 영역 삭제하기"><Trash2 size={16}/></button>
                           <button onClick={(e)=>{
                               e.stopPropagation();
                               const activeCanvas = canvasRefs.current[activeLayerId];
                               if (!activeCanvas) return;
                               const lCtx = activeCanvas.getContext('2d');
                               const img = new Image();
                               img.onload = () => {
                                   lCtx.globalAlpha = 1.0;
                                   lCtx.drawImage(img, activeSelection.x, activeSelection.y, activeSelection.w, activeSelection.h);
                                   setActiveSelection(null);
                                   setTool('pen');
                                   saveProgress('in_progress');
                               };
                               img.src = activeSelection.dataUrl;
                           }} className="px-4 h-10 bg-indigo-500 rounded-full font-black text-white flex items-center justify-center shadow-lg hover:bg-indigo-600 transition-all border-2 border-white whitespace-nowrap"><Check size={18} strokeWidth={3}/> 이동 완료</button>
                       </div>
                   </div>
                )}

                {/* 🔤 텍스트 에디터 오버레이 */}
                {activeText && tool === 'text' && (
                   <div className="absolute z-50 flex flex-col border-4 border-amber-400 border-dashed rounded-3xl bg-amber-50/40 p-1 min-w-[200px]"
                        style={{ left: activeText.x, top: activeText.y }}
                        onPointerDown={(e) => e.stopPropagation()}
                   >
                      <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-amber-500 text-white text-[11px] px-4 py-1.5 rounded-full cursor-move shadow-lg flex items-center gap-1.5 font-black whitespace-nowrap"
                         onPointerDown={(e) => {
                             e.stopPropagation();
                             const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
                             const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                             const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                             const initX = activeText.x; const initY = activeText.y;
                             const onMove = (moveEv) => {
                                 const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
                                 const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
                                 const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                 const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                 setActiveText(prev => ({ ...prev, x: initX + (clientX - startX) * scaleX, y: initY + (clientY - startY) * scaleY }));
                             };
                             const onUp = () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                             window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                             window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                         }}
                      >
                         <Maximize2 size={12}/> 드래그해서 이동
                      </div>

                      <textarea
                         autoFocus
                         value={activeText.text}
                         onChange={(e) => setActiveText(prev => ({...prev, text: e.target.value}))}
                         placeholder="여기에 글자를 입력하세요 ✨"
                         className="custom-scrollbar"
                         style={{
                             fontFamily: fontFamily, fontSize: `${lineWidth * 2 + 10}px`, color: color,
                             fontWeight: textStyle.bold ? '900' : '400', fontStyle: textStyle.italic ? 'italic' : 'normal',
                             textDecoration: `${textStyle.underline ? 'underline' : ''} ${textStyle.strike ? 'line-through' : ''}`.trim(),
                             opacity: opacity, background: 'transparent', border: 'none', outline: 'none', minHeight: '60px',
                             resize: 'both', lineHeight: 1.4, overflow: 'hidden', padding: '12px'
                         }}
                         onInput={(e) => {
                             e.target.style.height = 'auto'; e.target.style.height = (e.target.scrollHeight) + 'px';
                             e.target.style.width = 'auto'; e.target.style.width = (e.target.scrollWidth) + 'px';
                         }}
                      />

                      <div className="absolute -bottom-14 left-1/2 -translate-x-1/2 flex gap-3">
                         <button onClick={() => setActiveText(null)} className="w-12 h-12 bg-rose-500 rounded-full text-white flex items-center justify-center shadow-lg hover:bg-rose-600 hover:-translate-y-1 transition-all border-4 border-white"><Trash2 size={20}/></button>
                         <button onClick={() => {
                            const activeCanvas = canvasRefs.current[activeLayerId];
                            if (!activeCanvas) return;
                            pushUndoState(); 
                            const lCtx = activeCanvas.getContext('2d');
                            lCtx.save(); lCtx.globalCompositeOperation = 'source-over'; lCtx.globalAlpha = opacity; lCtx.fillStyle = color; lCtx.textBaseline = 'top';
                            
                            const fontSize = lineWidth * 2 + 10;
                            lCtx.font = `${textStyle.italic ? 'italic' : 'normal'} ${textStyle.bold ? '900' : '400'} ${fontSize}px ${fontFamily}`;
                            
                            const lines = activeText.text.split('\n');
                            const lineHeight = fontSize * 1.4; 
                            const paddingOffset = 12;
                            const startX = activeText.x + paddingOffset;
                            let currentY = activeText.y + paddingOffset;

                            lines.forEach((line) => {
                                lCtx.fillText(line, startX, currentY);
                                const textWidth = lCtx.measureText(line).width;
                                lCtx.strokeStyle = color; lCtx.lineWidth = Math.max(1.5, fontSize * 0.08); lCtx.lineCap = 'butt';
                                if (textStyle.underline) { lCtx.beginPath(); lCtx.moveTo(startX, currentY + fontSize * 1.15); lCtx.lineTo(startX + textWidth, currentY + fontSize * 1.15); lCtx.stroke(); }
                                if (textStyle.strike) { lCtx.beginPath(); lCtx.moveTo(startX, currentY + fontSize * 0.55); lCtx.lineTo(startX + textWidth, currentY + fontSize * 0.55); lCtx.stroke(); }
                                currentY += lineHeight;
                            });
                            lCtx.restore(); setActiveText(null); saveProgress('in_progress');
                         }} className="px-6 h-12 bg-emerald-500 rounded-full font-black text-white flex items-center justify-center shadow-lg hover:bg-emerald-600 hover:-translate-y-1 transition-all border-4 border-white gap-1 whitespace-nowrap"><Check size={20} strokeWidth={3}/> 글씨 꾹 찍기!</button>
                      </div>
                   </div>
                )}

                {/* Shape Overlay Editor */}
                {activeShape && tool === 'shape' && (
                   <div 
                      className="absolute border-4 border-indigo-400 border-dashed z-50 bg-indigo-500/10 touch-none flex items-center justify-center group rounded-3xl"
                      style={{ left: activeShape.x, top: activeShape.y, width: activeShape.w, height: activeShape.h }}
                   >
                       <svg width="100%" height="100%" style={{ pointerEvents: 'none' }}>
                          {activeShape.type === 'rect' && <rect x="0" y="0" width="100%" height="100%" fill={fillShape ? color : 'none'} fillOpacity={fillShape ? opacity : 1} stroke={color} strokeWidth={lineWidth} strokeOpacity={opacity} rx={16} ry={16} />}
                          {activeShape.type === 'circle' && <ellipse cx="50%" cy="50%" rx="50%" ry="50%" fill={fillShape ? color : 'none'} fillOpacity={fillShape ? opacity : 1} stroke={color} strokeWidth={lineWidth} strokeOpacity={opacity} />}
                          {activeShape.type === 'triangle' && <polygon points={`50%,0 100%,100% 0,100%`} fill={fillShape ? color : 'none'} fillOpacity={fillShape ? opacity : 1} stroke={color} strokeWidth={lineWidth} strokeOpacity={opacity} strokeLinejoin="round" />}
                       </svg>
                       
                       <div className="absolute inset-0 cursor-move"
                          onPointerDown={(e) => {
                              e.stopPropagation();
                              const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
                              const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                              const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                              const initX = activeShape.x; const initY = activeShape.y;
                              const onMove = (moveEv) => {
                                  const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
                                  const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
                                  const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                  const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                  setActiveShape(prev => ({ ...prev, x: initX + (clientX - startX) * scaleX, y: initY + (clientY - startY) * scaleY }));
                              };
                              const onUp = () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                              window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                              window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                          }}
                       />

                       <div className="absolute -right-4 -bottom-4 w-8 h-8 bg-indigo-500 rounded-full cursor-nwse-resize shadow-lg flex items-center justify-center text-white border-2 border-white hover:scale-110 transition-transform"
                          onPointerDown={(e) => {
                              e.stopPropagation();
                              const canvasRect = canvasRefs.current[activeLayerId].getBoundingClientRect();
                              const startX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                              const startY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                              const initW = activeShape.w; const initH = activeShape.h;
                              const onMove = (moveEv) => {
                                  const scaleX = canvasRefs.current[activeLayerId].width / canvasRect.width;
                                  const scaleY = canvasRefs.current[activeLayerId].height / canvasRect.height;
                                  const clientX = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientX : moveEv.clientX;
                                  const clientY = (moveEv.touches && moveEv.touches.length > 0) ? moveEv.touches[0].clientY : moveEv.clientY;
                                  setActiveShape(prev => ({ ...prev, w: Math.max(40, initW + (clientX - startX) * scaleX), h: Math.max(40, initH + (clientY - startY) * scaleY) }));
                              };
                              const onUp = () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
                              window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
                              window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
                          }}
                       ><Maximize2 size={14} /></div>

                       <div className="absolute -top-16 right-0 flex gap-2">
                           <button onClick={(e)=>{e.stopPropagation(); setActiveShape(null); setTool('pen');}} className="w-12 h-12 bg-rose-500 rounded-full text-white flex items-center justify-center shadow-lg hover:bg-rose-600 hover:-translate-y-1 transition-all border-2 border-white"><Trash2 size={20}/></button>
                           <button onClick={(e)=>{e.stopPropagation(); stampShape();}} className="px-6 h-12 bg-emerald-500 rounded-full font-black text-white flex items-center justify-center shadow-lg hover:bg-emerald-600 hover:-translate-y-1 transition-all border-4 border-white gap-1 whitespace-nowrap"><Check size={20} strokeWidth={3}/> 도형 꾹 찍기!</button>
                       </div>
                   </div>
                )}
             </div>
          </div>
        </div>
      )
    }

    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = createRoot(rootElement);
      root.render(<App />);
    }
  </script>
</body>
</html>
