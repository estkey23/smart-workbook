  <!-- React Application Code -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, addDoc, getDocs, deleteDoc } from 'firebase/firestore';
    import { Pencil, Eraser, Send, Plus, FileText, AlertCircle, Clock, Trash2, Settings, DownloadCloud, Menu, X, Square, Circle, Triangle, Check, Image as ImageIcon, Video, Link as LinkIcon, Lightbulb, ExternalLink, Layers, Eye, EyeOff, Paperclip, Download, Lock, Key, RefreshCw, Clipboard, Sparkles, PaintBucket, ZoomIn, ZoomOut, Maximize2, RotateCcw, BookOpen, School, ChevronLeft, ChevronRight, Palette, Smile, Type, Bold, Italic, Underline, Strikethrough, Undo2, Cloud, Link, Unlink, Hand, Scissors, Pipette } from 'lucide-react';

    // 🌟 선생님의 파이어베이스 설정 🌟
    const firebaseConfig = {
      apiKey: "AIzaSyAY5jRQWWKgymfHMmZxR55k_Sy26NrV_yQ",
      authDomain: "smart-work-6baed.firebaseapp.com",
      projectId: "smart-work-6baed",
      storageBucket: "smart-work-6baed.firebasestorage.app",
      messagingSenderId: "952088924411",
      appId: "1:952088924411:web:32dcab321d7348b850e05e",
      measurementId: "G-FDPRHKNKV8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    const appId = 'github-smart-worksheet-v10-final';

    const loadPdfJs = async () => {
      if (window.pdfjsLib) return window.pdfjsLib;
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        script.onload = () => {
          if(!window.pdfjsLib) reject("Failed to load PDF.js");
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          resolve(window.pdfjsLib);
        };
        script.onerror = reject;
        document.head.appendChild(script);
      });
    };

    // 사진 용량 초절약 압축 도우미 함수 (1200px 제한 & JPEG 변환)
    const compressImage = (dataUrl, callback) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width; let h = img.height;
        if(w > 1200) { h = Math.round(h * (1200/w)); w = 1200; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; // 투명 배경을 흰색으로 채워 용량 절감
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.8));
      };
      img.src = dataUrl;
    };

    const DEFAULT_STUDENTS = [
      { id: 'student_1', name: '김민수' },
      { id: 'student_2', name: '이지은' },
      { id: 'student_3', name: '박지호' },
      { id: 'student_4', name: '최유리' },
      { id: 'student_5', name: '정우진' },
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);

      const [assignments, setAssignments] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [credentials, setCredentials] = useState({}); 
      const [students, setStudents] = useState(DEFAULT_STUDENTS); 
      const [schoolInfo, setSchoolInfo] = useState({ schoolName: '행복', grade: '5', classNum: '1' });

      const [appAlert, setAppAlert] = useState({ show: false, title: '', message: '', onConfirm: null, isConfirm: false });
      const [passwordPrompt, setPasswordPrompt] = useState({ show: false, targetRole: null, passwordInput: '', error: '' });

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) { console.error("Auth error:", error); }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          setIsInitializing(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const assignRef = collection(db, 'artifacts', appId, 'public', 'data', 'assignments');
        const subRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        const credRef = collection(db, 'artifacts', appId, 'public', 'data', 'credentials');
        const rosterRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', 'roster');
        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'schoolInfo');

        const unsubAssign = onSnapshot(assignRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAssignments(data.sort((a, b) => b.createdAt - a.createdAt));
        }, (err) => console.error(err));

        const unsubSub = onSnapshot(subRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setSubmissions(data);
        }, (err) => console.error(err));

        const unsubCred = onSnapshot(credRef, (snapshot) => {
          const creds = {};
          snapshot.docs.forEach(doc => { creds[doc.id] = doc.data().password; });
          setCredentials(creds);
        }, (err) => console.error(err));

        const unsubRoster = onSnapshot(rosterRef, (docSnap) => {
          if (docSnap.exists() && docSnap.data().list) setStudents(docSnap.data().list);
          else setDoc(rosterRef, { list: DEFAULT_STUDENTS });
        }, (err) => console.error(err));

        const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
          if (docSnap.exists()) setSchoolInfo(docSnap.data());
        }, (err) => console.error(err));

        return () => { unsubAssign(); unsubSub(); unsubCred(); unsubRoster(); unsubSettings(); };
      }, [user]);

      const showAlert = (title, message) => setAppAlert({ show: true, title, message, onConfirm: null, isConfirm: false });
      const showConfirm = (title, message, onConfirm) => setAppAlert({ show: true, title, message, onConfirm, isConfirm: true });
      const handleAlertClose = () => setAppAlert({ show: false, title: '', message: '', onConfirm: null, isConfirm: false });
      const handleAlertConfirm = () => { if (appAlert.onConfirm) appAlert.onConfirm(); handleAlertClose(); };

      const handleLoginClick = (selectedRole) => setPasswordPrompt({ show: true, targetRole: selectedRole, passwordInput: '', error: '' });
      const handleLoginSubmit = (e) => {
        e.preventDefault();
        const roleId = passwordPrompt.targetRole === 'teacher' ? 'teacher' : passwordPrompt.targetRole.id;
        const savedPassword = credentials[roleId] || '0000'; 
        if (passwordPrompt.passwordInput === savedPassword) {
          setRole(passwordPrompt.targetRole);
          setPasswordPrompt({ show: false, targetRole: null, passwordInput: '', error: '' });
        } else {
          setPasswordPrompt(prev => ({ ...prev, error: '비밀번호가 올바르지 않습니다! 다시 입력해볼까요? 😢' }));
        }
      };

      if (isInitializing) return <div className="flex h-screen items-center justify-center text-xl font-bold text-indigo-400 bg-indigo-50">마법의 교실로 들어가는 중... ✨</div>;

      return (
        <>
          {appAlert.show && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-indigo-100 animate-fade-in text-center transform transition-all">
                <div className="mx-auto w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mb-4 text-indigo-500">
                  {appAlert.isConfirm ? <AlertCircle size={32} /> : <Smile size={32} />}
                </div>
                <h3 className="text-xl font-black text-slate-800 mb-2">{appAlert.title}</h3>
                <p className="text-slate-500 text-sm mb-8 whitespace-pre-wrap leading-relaxed">{appAlert.message}</p>
                <div className="flex gap-3 justify-center">
                  {appAlert.isConfirm && (
                    <button onClick={handleAlertClose} className="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-bold text-sm transition-all shadow-sm">아니요</button>
                  )}
                  <button onClick={handleAlertConfirm} className="px-8 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white rounded-2xl font-bold text-sm transition-all shadow-lg shadow-indigo-200 hover:-translate-y-1">예, 확인했어요!</button>
                </div>
              </div>
            </div>
          )}

          {!role ? (
            <div className="flex flex-col h-screen items-center justify-center bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 p-4 relative overflow-hidden">
              <div className="absolute top-10 left-10 w-32 h-32 bg-yellow-200 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob"></div>
              <div className="absolute top-20 right-20 w-40 h-40 bg-purple-200 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-2000"></div>
              <div className="absolute -bottom-8 left-1/2 w-48 h-48 bg-pink-200 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-4000"></div>

              {passwordPrompt.show && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                  <form onSubmit={handleLoginSubmit} className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-indigo-100 animate-fade-in space-y-5">
                    <div className="text-center">
                      <div className="w-16 h-16 bg-gradient-to-tr from-indigo-100 to-purple-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><Lock size={28} /></div>
                      <h3 className="text-xl font-black text-slate-800">{passwordPrompt.targetRole === 'teacher' ? '선생님 안녕하세요! 👩‍🏫' : `${passwordPrompt.targetRole.name} 학생 안녕! 🎒`}</h3>
                      <p className="text-xs text-slate-400 mt-2 font-medium">안전을 위해 우리만의 비밀번호를 입력해 주세요.</p>
                    </div>
                    <div>
                      <input type="password" value={passwordPrompt.passwordInput} onChange={(e) => setPasswordPrompt(prev => ({ ...prev, passwordInput: e.target.value, error: '' }))} placeholder="비밀번호 4자리" autoFocus className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center font-black tracking-[0.5em] text-xl text-slate-700 focus:outline-none focus:border-indigo-400 focus:bg-white transition-all shadow-inner" />
                      {passwordPrompt.error && <p className="text-[11px] font-bold text-rose-500 mt-2 text-center animate-bounce">{passwordPrompt.error}</p>}
                    </div>
                    <div className="bg-amber-50 p-3 rounded-2xl border-2 border-amber-100 text-center"><span className="text-[11px] font-black text-amber-700">💡 초기 비밀번호는 <span className="text-rose-500 underline text-sm">0000</span> 입니다!</span></div>
                    <div className="flex gap-3 pt-2">
                      <button type="button" onClick={() => setPasswordPrompt({ show: false, targetRole: null, passwordInput: '', error: '' })} className="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-bold text-sm transition-all">뒤로가기</button>
                      <button type="submit" className="flex-1 py-3.5 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white rounded-2xl font-black text-sm transition-all shadow-lg shadow-indigo-200 hover:-translate-y-1">교실 들어가기 🚀</button>
                    </div>
                  </form>
                </div>
              )}

              <div className="bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[3rem] shadow-2xl text-center max-w-xl w-full border-4 border-white relative z-10">
                <div className="flex justify-center mb-6 text-indigo-500"><div className="bg-white p-4 rounded-3xl shadow-xl shadow-indigo-100 rotate-3 hover:rotate-6 transition-transform"><Palette size={56} strokeWidth={2.5}/></div></div>
                <h1 className="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-3 tracking-tight">스마트 드로잉 학습지 ✨</h1>
                <p className="text-slate-500 mb-10 font-bold bg-slate-100 inline-block px-4 py-1.5 rounded-full text-sm border border-slate-200">🏫 {schoolInfo.schoolName}학교 {schoolInfo.grade}학년 {schoolInfo.classNum}반</p>
                <div className="space-y-6">
                  <button onClick={() => handleLoginClick('teacher')} className="w-full py-4.5 bg-slate-800 text-white rounded-3xl font-black text-lg hover:bg-slate-900 transition-all flex items-center justify-center gap-2 shadow-xl shadow-slate-200 hover:-translate-y-1"><Settings size={22} /> 선생님으로 교실 열기</button>
                  <div className="relative py-2"><div className="absolute inset-0 flex items-center"><div className="w-full border-t-2 border-dashed border-slate-200"></div></div><div className="relative flex justify-center"><span className="bg-transparent px-4 text-xs font-black text-slate-400 uppercase tracking-widest">우리 반 학생들</span></div></div>
                  {/* 👥 학생 명단: 한 줄 5명 × 최대 4줄 노출 (스크롤로 그 이상도 접근 가능) */}
                  <div className="grid grid-cols-5 gap-2 max-h-[288px] overflow-y-auto pr-1 custom-scrollbar">
                    {students.map(student => (
                      <button key={student.id} onClick={() => handleLoginClick(student)} className="py-3 px-1 border-2 border-indigo-50 bg-white rounded-xl font-black text-slate-600 hover:border-indigo-400 hover:bg-indigo-50 hover:text-indigo-700 transition-all flex items-center justify-center gap-1 shadow-sm hover:shadow-md text-xs">
                        <Smile size={13} className="text-indigo-400 shrink-0"/>
                        <span className="truncate">{student.name}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="min-h-screen bg-[#FFF9F0] font-sans text-slate-800">
              <header className="bg-white/80 backdrop-blur-md shadow-sm border-b-4 border-indigo-100 px-6 py-4 flex justify-between items-center sticky top-0 z-10 hidden-on-canvas">
                <h1 className="text-xl md:text-2xl font-black text-indigo-600 flex items-center gap-2 tracking-tight"><Palette className="hidden md:block text-purple-500" strokeWidth={3}/> <span className="hidden md:inline">스마트 학습지 교실 ✨</span><span className="md:hidden">{schoolInfo.grade}-{schoolInfo.classNum} 교실</span></h1>
                <div className="flex items-center gap-4">
                  <span className="font-bold bg-indigo-50 text-indigo-700 border border-indigo-100 px-4 py-2 rounded-full text-xs md:text-sm flex items-center gap-1.5 shadow-sm">{role === 'teacher' ? '👩‍🏫 선생님 모드' : `👦 ${role.name} 학생`}</span>
                  <button onClick={() => setRole(null)} className="text-xs text-gray-500 hover:text-rose-500 underline transition-colors">나가기</button>
                </div>
              </header>

              <main className="p-4 md:p-8 max-w-7xl mx-auto">
                {role === 'teacher' ? <TeacherDashboard assignments={assignments} submissions={submissions} students={students} credentials={credentials} schoolInfo={schoolInfo} showAlert={showAlert} showConfirm={showConfirm} /> : <StudentDashboard student={role} assignments={assignments} submissions={submissions} credentials={credentials} schoolInfo={schoolInfo} showAlert={showAlert} showConfirm={showConfirm} />}
              </main>
            </div>
          )}
        </>
      );
    }

    // ==========================================
    // TEACHER DASHBOARD
    // ==========================================
    function TeacherDashboard({ assignments, submissions, students, credentials, schoolInfo, showAlert, showConfirm }) {
        const [showCreateForm, setShowCreateForm] = useState(false);
        const [selectedAssignment, setSelectedAssignment] = useState(null);
        const [showSettingsModal, setShowSettingsModal] = useState(false); 
        const [assignmentTab, setAssignmentTab] = useState('active'); 

        const [newTeacherPassword, setNewTeacherPassword] = useState('');
        const [passwordConfirm, setNewPasswordConfirm] = useState('');
        const [searchStudent, setSearchStudent] = useState('');
        const [bulkStudentInput, setBulkStudentInput] = useState(''); 
        const [tempSchoolInfo, setTempSchoolInfo] = useState(schoolInfo);
        // 🗑️ 종료된 과제 선택 삭제용 상태 (탭 전환 시 초기화)
        const [selectedClosedIds, setSelectedClosedIds] = useState([]);
        useEffect(() => { setSelectedClosedIds([]); }, [assignmentTab]);

        useEffect(() => { setTempSchoolInfo(schoolInfo); }, [schoolInfo, showSettingsModal]);

        const getLaggingStudents = () => {
          const lagging = students.map(student => {
            let missingCount = 0;
            assignments.forEach(assign => {
              const sub = submissions.find(s => s.assignmentId === assign.id && s.studentId === student.id);
              if (!sub || (sub.status !== 'submitted' && sub.status !== 'graded')) { missingCount++; }
            });
            return { ...student, missingCount };
          }).filter(s => s.missingCount >= 3);
          return lagging.sort((a, b) => b.missingCount - a.missingCount);
        };
      
        const laggingStudents = getLaggingStudents();
        const activeAssignments = assignments.filter(a => a.status !== 'closed');
        const closedAssignments = assignments.filter(a => a.status === 'closed');
        const displayedAssignments = assignmentTab === 'active' ? activeAssignments : closedAssignments;

        const handleResetStudentPassword = async (studentId, studentName) => {
          showConfirm('비밀번호 초기화', `정말로 ${studentName} 학생의 비밀번호를 0000으로 초기화하시겠습니까?`, async () => {
              try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'credentials', studentId), { password: '0000' }); showAlert('초기화 성공', `${studentName} 학생의 비밀번호가 0000으로 성공적으로 초기화되었습니다.`); } catch (e) { showAlert('오류', '데이터베이스 수정 중 오류가 발생했습니다.'); }
          });
        };

        const handleChangeTeacherPassword = async (e) => {
          e.preventDefault();
          if (!newTeacherPassword) return showAlert('경고', '새 비밀번호를 입력해주세요.');
          if (newTeacherPassword !== passwordConfirm) return showAlert('오류', '비밀번호 확인이 일치하지 않습니다.');
          try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'credentials', 'teacher'), { password: newTeacherPassword }); showAlert('완료', '선생님 계정의 비밀번호가 성공적으로 변경되었습니다.'); setNewTeacherPassword(''); setNewPasswordConfirm(''); } catch (e) { showAlert('오류', '오류가 발생했습니다.'); }
        };

        const handleSaveSchoolInfo = async (e) => {
          e.preventDefault();
          try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'schoolInfo'), tempSchoolInfo); showAlert('적용 완료', '학교 및 학급 정보가 성공적으로 변경되었습니다.'); } catch (err) { showAlert('오류', '업데이트 도중 오류가 발생했습니다.'); }
        };

        // 🗑️ 종료된 과제 선택 삭제: 과제 및 관련 제출물까지 함께 정리
        const handleDeleteClosedAssignments = () => {
          if (selectedClosedIds.length === 0) return showAlert('알림', '삭제할 종료된 과제를 먼저 선택해주세요!');
          showConfirm('종료된 과제 삭제', `선택하신 ${selectedClosedIds.length}개의 종료된 과제와 관련 제출물이 모두 삭제됩니다.\n정말 진행할까요?`, async () => {
            try {

    function CreateAssignmentForm({ onClose, showAlert }) {
        const [title, setTitle] = useState('');
        const [instructions, setInstructions] = useState('');
        const [deadline, setDeadline] = useState('');
        const [orientation, setOrientation] = useState('portrait');
        
        const [baseImages, setBaseImages] = useState([]); 
        const [isConvertingPdf, setIsConvertingPdf] = useState(false);

        // PDF 페이지 범위 선택용 상태
        const [pendingPdf, setPendingPdf] = useState(null);
        const [pdfFromPage, setPdfFromPage] = useState(1);
        const [pdfToPage, setPdfToPage] = useState(1);

        const [refImageUrl, setRefImageUrl] = useState('');
        const [refVideoUrl, setRefVideoUrl] = useState('');
        const [refLinkUrl, setRefLinkUrl] = useState('');

        const handleBaseImageUpload = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          // 같은 파일 재선택 허용
          e.target.value = '';

          const fileName = (file.name || '').toLowerCase();
          const ext = fileName.includes('.') ? fileName.split('.').pop() : '';
          const isHwpLike = ['hwp', 'hwpx', 'doc', 'docx', 'ppt', 'pptx', 'odt', 'rtf'].includes(ext);

          if (file.type === 'application/pdf' || ext === 'pdf') {
            // 1) PDF 열어서 총 페이지 수 파악 → 범위 선택 UI 표시 (아직 변환하지 않음)
            setIsConvertingPdf(true);
            try {
              const pdfjsLib = await loadPdfJs();
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              setPendingPdf({ pdf, fileName: file.name, numPages: pdf.numPages });
              setPdfFromPage(1);
              setPdfToPage(Math.min(pdf.numPages, 5));
            } catch (err) {
              console.error(err);
              showAlert('오류', 'PDF 파일을 여는 데 실패했습니다. 다른 파일을 사용해주세요.');
              setPendingPdf(null);
            } finally {
              setIsConvertingPdf(false);
            }
          } else if (file.type.startsWith('image/') || ['jpg','jpeg','png','gif','webp','bmp'].includes(ext)) {
            // 업로드 시 1200px 리사이즈 및 JPEG 강제 압축 적용
            compressImage(URL.createObjectURL(file), (compressedUrl) => setBaseImages([compressedUrl]));
          } else if (isHwpLike) {
            showAlert(
              'HWP/오피스 파일 안내 📎',
              `"${file.name}" 파일은 브라우저에서 바로 배경으로 변환하기 어려워요.\n\n💡 다음 중 한 가지 방법으로 변환 후 업로드해주세요:\n1) 한글/워드/파워포인트에서 [파일] → [PDF로 저장] 후 PDF 업로드\n2) 문서 화면을 캡처해 이미지(JPG/PNG)로 저장 후 업로드\n\nPDF로 저장하시면 여러 페이지를 한 번에 배경으로 사용하실 수 있습니다! 😊`
            );
          } else {
            showAlert('알림', 'PDF, 이미지(JPG/PNG/WEBP), HWP, DOC(X), PPT(X) 등의 파일만 업로드 가능합니다.');
          }
        };

        // PDF 페이지 범위 확정 후 실제 변환 실행
        const confirmPdfConversion = async () => {
          if (!pendingPdf) return;
          const total = pendingPdf.numPages;
          let from = Math.max(1, Math.min(total, parseInt(pdfFromPage) || 1));
          let to = Math.max(1, Math.min(total, parseInt(pdfToPage) || from));
          if (to < from) { const tmp = from; from = to; to = tmp; }
          const maxPages = 20;
          if (to - from + 1 > maxPages) {
            showAlert('알림', `한 번에 최대 ${maxPages}페이지까지 변환할 수 있어요. 범위를 줄여주세요.`);
            return;

          setIsConvertingPdf(true);
          try {
            const extractedImages = [];
            for (let i = from; i <= to; i++) {
              const page = await pendingPdf.pdf.getPage(i);
              const viewport = page.getViewport({ scale: 2.0 });
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              canvas.width = viewport.width;
              canvas.height = viewport.height;
              await page.render({ canvasContext: ctx, viewport: viewport }).promise;
              extractedImages.push(canvas.toDataURL('image/jpeg', 0.85));
            }
            setBaseImages(extractedImages);
            showAlert('변환 완료! ✨', `${from}~${to}페이지 (총 ${extractedImages.length}장)가 고화질 배경으로 적용되었습니다.`);
            setPendingPdf(null);
          } catch (err) {

            showAlert('오류', 'PDF 변환에 실패했습니다. 범위를 줄이거나 다른 파일을 시도해주세요.');

    function GradingPanel({ assignment, submissions, students, schoolInfo, showAlert, showConfirm }) {
        const [selectedSubmission, setSelectedSubmission] = useState(null);

        const toggleAssignmentStatus = () => {

        const getStatusBadge = (sub) => {

          if (sub.status === 'graded') return <span className="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-md whitespace-nowrap">평가완료 ⭐</span>;
          return <span className="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-md whitespace-nowrap">작성중</span>;
        }
      
        const handleFeedback = async (feedbackType) => {
          if (!selectedSubmission) return;
          let newStatus = 'graded';
          let feedbackText = feedbackType;
          if (feedbackType === 'resubmit') { newStatus = 'resubmit'; feedbackText = '조금 아쉬워요! 다시 확인해보고 제출해볼까요? 💪'; }
          try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', selectedSubmission.id), { status: newStatus, feedback: feedbackText, updatedAt: Date.now() });
            showAlert('피드백 전송 완료 ✨', '선생님의 다정한 피드백이 학생에게 바로 전달되었습니다!');
            setSelectedSubmission(null);
          } catch (e) { showAlert('오류', '오류 발생'); }
        };

        // 💾 선택형 일괄/개별 다운로드 기능 - 학습지 배경 + 학생 필기를 합성해 JPEG로 저장
        const composeAndDownload = (bgUrl, drawingUrl, fileName) => {
          return new Promise((resolve) => {
            const drawImg = new Image();
            drawImg.crossOrigin = 'anonymous';
            drawImg.onload = () => {
              const w = drawImg.width, h = drawImg.height;
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);

              const finalize = () => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                resolve();
              };

              if (bgUrl) {
                const bgImg = new Image();
                bgImg.crossOrigin = 'anonymous';
                bgImg.onload = () => { ctx.drawImage(bgImg, 0, 0, w, h); ctx.drawImage(drawImg, 0, 0); finalize(); };
                bgImg.onerror = () => { ctx.drawImage(drawImg, 0, 0); finalize(); };
                bgImg.src = bgUrl;
              } else { ctx.drawImage(drawImg, 0, 0); finalize(); }
            };
            drawImg.onerror = () => resolve();
            drawImg.src = drawingUrl;
          });
        };

                  const fileName = `[${schoolInfo.grade}학년${schoolInfo.classNum}반]_${sub.studentName}_${assignment.title}${pageText}.jpg`;
                  await composeAndDownload(baseImages[idx], pageUrl, fileName);

                  {assignment.status === 'closed' ? <><RefreshCw size={14}/> 다시 열기</> : <><Check size={14}/> 마감하기</>}
                </button>
              </div>
            </div>
            
            <div className="flex flex-col md:flex-row flex-1 overflow-hidden min-h-[500px]">
              <div className="md:w-1/3 border-r-2 border-slate-100 overflow-y-auto max-h-[600px] bg-slate-50/50 p-3 space-y-2 custom-scrollbar">
                {/* 전체 선택 체크박스 바 */}
                <div className="flex items-center px-3 mb-2 gap-2">
                   <input type="checkbox" onChange={(e) => e.target.checked ? setSelectedSubmissions(submissions.filter(s=>s.assignmentId===assignment.id).map(s=>s.id)) : setSelectedSubmissions([])} checked={selectedSubmissions.length > 0 && selectedSubmissions.length === submissions.filter(s=>s.assignmentId===assignment.id).length} className="w-4 h-4 text-indigo-600 rounded" />

                        <input type="checkbox" disabled={!sub} checked={isChecked} onChange={(e) => { e.stopPropagation(); if(e.target.checked) setSelectedSubmissions([...selectedSubmissions, sub.id]); else setSelectedSubmissions(selectedSubmissions.filter(id=>id!==sub.id)); }} className="w-3.5 h-3.5 text-indigo-600 rounded disabled:opacity-30 shrink-0" />
                        <div className="flex-1 flex items-center justify-between gap-1.5 cursor-pointer min-w-0 flex-nowrap" onClick={() => sub && setSelectedSubmission(sub)}>
                          <div className="flex items-center gap-1.5 min-w-0 shrink">
                             <div className="w-6 h-6 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500 font-black text-[10px] shrink-0">{student.name.charAt(0)}</div>
                             <span className="font-black text-slate-700 text-xs truncate">{student.name}</span>
                          </div>
                          <span className="text-[10px] font-black shrink-0">{getStatusBadge(sub)}</span>
                        </div>
                      </div>
                    </div>
                  )
                })}
              </div>

              <div className="md:w-2/3 p-4 flex flex-col bg-slate-100 flex-1 overflow-y-auto max-h-[600px] custom-scrollbar">
                {selectedSubmission ? (
                  <div className="space-y-4 flex-1 flex flex-col">
                    <div className="bg-white min-h-[400px] flex-1 rounded-[2rem] shadow-md border-2 border-slate-200 overflow-hidden relative flex flex-col items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                       {pagesData.length > 0 && pagesData[gradingPage] ? (
                         // 📐 학습지 방향에 맞춰 종횡비를 고정 → 배경과 필기 완벽 정렬
                         <div 
                           className="relative bg-white rounded-xl overflow-hidden shadow-inner"
                           style={{ 
                             aspectRatio: assignment.orientation === 'landscape' ? '1.414 / 1' : '1 / 1.414',
                             maxHeight: '70vh',
                             width: 'auto',
                             height: '70vh',
                             maxWidth: '100%'
                           }}
                         >
                           {/* 🖼️ 학습지 배경(선생님 원본) - 캔버스 크기에 맞춰 채움 */}
                           {assignment.baseImages && assignment.baseImages[gradingPage] && (
                             <img src={assignment.baseImages[gradingPage]} alt="학습지 배경" className="absolute inset-0 w-full h-full block" style={{ objectFit: 'fill' }} />
                           )}
                           {/* ✏️ 학생 필기(투명 PNG) - 배경 위에 완전 겹침 */}
                           <img 
                             src={pagesData[gradingPage]} 
                             alt="학생 필기" 
                             className="absolute inset-0 w-full h-full block drop-shadow-sm"
                             style={{ objectFit: 'fill' }}
                           />
                         </div>
                       ) : <div className="text-slate-300 font-bold flex flex-col items-center gap-2"><Pencil size={32}/> 빈 도화지입니다</div>}
                       {pagesData.length > 1 && (
                         <div className="absolute bottom-5 bg-white/90 backdrop-blur-md rounded-full px-5 py-2.5 flex items-center gap-4 text-slate-700 shadow-xl border border-slate-200">
                            <button onClick={() => setGradingPage(prev => Math.max(0, prev - 1))} disabled={gradingPage === 0} className="hover:text-indigo-500 disabled:opacity-30 transition-colors bg-slate-100 p-1 rounded-full"><ChevronLeft size={20}/></button>
                            <span className="text-sm font-black w-10 text-center">{gradingPage + 1} / {pagesData.length}</span>
                            <button onClick={() => setGradingPage(prev => Math.min(pagesData.length - 1, prev + 1))} disabled={gradingPage === pagesData.length - 1} className="hover:text-indigo-500 disabled:opacity-30 transition-colors bg-slate-100 p-1 rounded-full"><ChevronRight size={20}/></button>
                         </div>
                       )}
                    </div>

                    {hasStudentAttachments && (
                      <div className="bg-white p-5 rounded-3xl border-2 border-indigo-100 shadow-sm space-y-4 animate-fade-in-down">
                        <h4 className="font-black text-indigo-800 text-sm flex items-center gap-2 border-b-2 border-indigo-50 pb-2">
                          <div className="bg-indigo-100 p-1.5 rounded-lg"><Paperclip size={16}/></div> {selectedSubmission.studentName} 학생의 기특한 첨부자료 🎁
                        </h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
                          {selectedSubmission.studentFileType && selectedSubmission.studentFileType !== 'none' && (
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                              <div>
                                <span className="text-[10px] font-black text-slate-400 block uppercase mb-1">첨부 문서</span>
                                <span className="font-bold text-slate-700 truncate max-w-[150px] block">{selectedSubmission.studentFileName || `과제파일.${selectedSubmission.studentFileType}`}</span>
                              </div>
                              <button onClick={() => showAlert('파일 다운로드', `[${selectedSubmission.studentFileName || '과제파일'}] 다운로드를 완료했습니다.`)} className="p-2.5 bg-indigo-100 text-indigo-600 rounded-xl hover:bg-indigo-200 transition"><Download size={16}/></button>
                            </div>
                          )}
                          {selectedSubmission.studentRefLinkUrl && (
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                              <div className="min-w-0 flex-1"><span className="text-[10px] font-black text-slate-400 block mb-1">참고 사이트</span><span className="font-bold text-blue-600 truncate block pr-2">{selectedSubmission.studentRefLinkUrl}</span></div>
                              <a href={selectedSubmission.studentRefLinkUrl} target="_blank" rel="noreferrer" className="p-2.5 bg-blue-100 text-blue-600 rounded-xl hover:bg-blue-200 flex items-center justify-center"><ExternalLink size={16}/></a>
                            </div>
                          )}
                          {selectedSubmission.studentRefVideoUrl && (
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                              <div className="min-w-0 flex-1"><span className="text-[10px] font-black text-slate-400 block mb-1">설명 영상</span><span className="font-bold text-rose-600 truncate block pr-2">{selectedSubmission.studentRefVideoUrl}</span></div>
                              <a href={selectedSubmission.studentRefVideoUrl} target="_blank" rel="noreferrer" className="p-2.5 bg-rose-100 text-rose-600 rounded-xl hover:bg-rose-200 flex items-center justify-center"><Video size={16}/></a>
                            </div>
                          )}
                          {selectedSubmission.studentRefImageUrl && (
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200 flex flex-col gap-2 col-span-1 md:col-span-2 shadow-sm">
                              <span className="text-[10px] font-black text-slate-400 block">조사 사진 미리보기</span>
                              <div className="flex gap-4 items-center">
                                <img src={selectedSubmission.studentRefImageUrl} alt="학생 첨부 이미지" className="h-20 w-28 object-cover rounded-xl border border-slate-200 bg-white shadow-sm" onError={(e) => { e.target.style.display='none'; }}/>
                                <div className="min-w-0 flex-1">
                                  <span className="text-[11px] font-bold text-slate-500 truncate block">이미지 열기</span>
                                  <a href={selectedSubmission.studentRefImageUrl} target="_blank" rel="noreferrer" className="text-xs bg-white border border-slate-200 px-3 py-1.5 rounded-lg text-slate-600 font-black mt-2 inline-flex items-center gap-1 hover:bg-slate-50 shadow-sm">크게 보기 <ExternalLink size={12}/></a>
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    )}

                    <div className="bg-white p-5 rounded-3xl border-2 border-slate-200 shadow-sm flex flex-col gap-3">
                      <p className="font-black text-slate-700 flex items-center gap-2"><Sparkles size={18} className="text-amber-400"/> 애정 듬뿍 피드백 남기기</p>
                      <div className="flex flex-wrap gap-2">
                        <button onClick={() => handleFeedback('너무 멋져요! 최고! 🌟')} className="flex-1 min-w-[120px] py-3 bg-emerald-100 text-emerald-700 font-black rounded-2xl hover:bg-emerald-200 transition-all shadow-sm">최고! 🌟</button>
                        <button onClick={() => handleFeedback('참 잘했어요! 짝짝짝 👏')} className="flex-1 min-w-[120px] py-3 bg-blue-100 text-blue-700 font-black rounded-2xl hover:bg-blue-200 transition-all shadow-sm">참 잘했어요 👏</button>
                        <button onClick={() => handleFeedback('노력하는 모습이 예뻐요! 💖')} className="flex-1 min-w-[120px] py-3 bg-pink-100 text-pink-700 font-black rounded-2xl hover:bg-pink-200 transition-all shadow-sm">노력상 💖</button>
                        <button onClick={() => handleFeedback('resubmit')} className="flex-1 min-w-[120px] py-3 bg-amber-100 text-amber-700 font-black rounded-2xl hover:bg-amber-200 transition-all shadow-sm">다시 도전 🔄</button>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="flex-1 flex flex-col items-center justify-center text-slate-300 text-center font-black gap-3 bg-white rounded-[2rem] border-4 border-dashed border-slate-100">
                    <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center"><Pencil size={40}/></div>
                    학생 이름과 체크박스를<br/>클릭하여 마법같은 제출물을 확인하세요!
                  </div>
                )}
              </div>
            </div>
          </div>
        )
    }

    // ==========================================
    // STUDENT DASHBOARD
    // ==========================================
    function StudentDashboard({ student, assignments, submissions, credentials, schoolInfo, showAlert, showConfirm }) {
      const [activeTab, setActiveTab] = useState('new');
      const [activeAssignment, setActiveAssignment] = useState(null);
      const [showPasswordChangeModal, setShowPasswordChangeModal] = useState(false); 

      const [currPassword, setCurrPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [newPasswordConfirm, setNewPasswordConfirm] = useState('');

      const newAssignments = [];
      const inProgressAssignments = [];
      const resubmitAssignments = [];
      const submittedAssignments = [];

      assignments.forEach(assign => {
        const sub = submissions.find(s => s.assignmentId === assign.id && s.studentId === student.id);
        if (!sub) newAssignments.push({ ...assign, subStatus: 'new' });
        else if (sub.status === 'in_progress') inProgressAssignments.push({ ...assign, submission: sub, subStatus: 'in_progress' });
        else if (sub.status === 'resubmit') resubmitAssignments.push({ ...assign, submission: sub, subStatus: 'resubmit' });
        else submittedAssignments.push({ ...assign, submission: sub, subStatus: sub.status });
      });

      useEffect(() => {
        const header = document.querySelector('.hidden-on-canvas');
        if (header) header.style.display = activeAssignment ? 'none' : 'flex';
        document.body.style.overflow = activeAssignment ? 'hidden' : 'auto';

        const resubmit = resubmitAssignments.find(a => a.submission.status === 'resubmit');
        if (resubmit && activeTab !== 'resubmit' && !activeAssignment) {
           showAlert('알림 💌', `선생님이 [${resubmit.title}] 과제를 확인하셨어요!\n수정해서 다시 제출해 볼까요? 💪`);
        }
      }, [submissions, activeAssignment]);

      const tabs = [
        { id: 'new', label: '새로운 과제 🎁', count: newAssignments.length, data: newAssignments },
        { id: 'inProgress', label: '풀고 있는 과제 ✏️', count: inProgressAssignments.length, data: inProgressAssignments },
        { id: 'resubmit', label: '다시 도전 🔄', count: resubmitAssignments.length, data: resubmitAssignments, alert: true },
        { id: 'submitted', label: '제출 완료 💯', count: submittedAssignments.length, data: submittedAssignments },
      ];

      const handleStudentPasswordChange = async (e) => {
        e.preventDefault();
        const savedPassword = credentials[student.id] || '0000';
        if (currPassword !== savedPassword) return showAlert('오류', '현재 사용중인 비밀번호가 일치하지 않습니다.');
        if (!newPassword) return showAlert('오류', '새롭게 설정할 비밀번호를 정확히 입력해주세요.');
        if (newPassword !== newPasswordConfirm) return showAlert('오류', '새 비밀번호 확인 입력이 일치하지 않습니다.');

        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'credentials', student.id), { password: newPassword });
          showAlert('변경 성공 🎉', '나만의 비밀번호가 안전하게 저장되었어요!');
          setShowPasswordChangeModal(false); setCurrPassword(''); setNewPassword(''); setNewPasswordConfirm('');
        } catch (err) { showAlert('오류', '실패했습니다.'); }
      };

      const openPracticeNotepad = () => {
        setActiveAssignment({
          id: `practice_${student.id}`,
          title: '📝 무한 자유 연습장 (낙서장)',
          instructions: '마음껏 S펜으로 연습하고 상상력을 펼쳐보세요! 하단의 [새 페이지]를 누르면 무한으로 쓸 수 있습니다. 🎨',
          orientation: 'portrait',
          isPractice: true,
          subStatus: 'in_progress',
          submission: submissions.find(s => s.assignmentId === `practice_${student.id}`)
        });
      };

      if (activeAssignment) {
        return (
          <div className="fixed inset-0 bg-[#FFF9F0] z-50 flex flex-col">
            <DrawingCanvas assignment={activeAssignment} student={student} onClose={() => setActiveAssignment(null)} showAlert={showAlert} showConfirm={showConfirm} schoolInfo={schoolInfo} />
          </div>
        )
      }

      return (
        <div className="max-w-6xl mx-auto pb-10 relative">
          {showPasswordChangeModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[120] flex items-center justify-center p-4">
              <form onSubmit={handleStudentPasswordChange} className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full border-4 border-teal-100 animate-fade-in space-y-5">
                <div className="text-center mb-6">
                  <div className="w-16 h-16 bg-teal-100 text-teal-500 rounded-full flex items-center justify-center mx-auto mb-3"><Key size={32}/></div>
                  <h3 className="text-xl font-black text-slate-800">나만의 비밀번호 만들기</h3>
                  <p className="text-xs text-slate-400 mt-1 font-bold">친구들이 모르는 안전한 암호를 지어주세요!</p>
                </div>
                <div className="space-y-4">
                  <input type="password" value={currPassword} onChange={(e) => setCurrPassword(e.target.value)} placeholder="현재 비밀번호 (기본 0000)" className="w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black tracking-widest text-center text-slate-700 outline-none focus:border-teal-400 focus:bg-white transition-all"/>
                  <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} placeholder="새로 정할 암호 🤩" className="w-full px-4 py-3.5 bg-teal-50/50 border-2 border-teal-100 rounded-2xl font-black tracking-widest text-center text-teal-800 outline-none focus:border-teal-400 focus:bg-white transition-all"/>
                  <input type="password" value={newPasswordConfirm} onChange={(e) => setNewPasswordConfirm(e.target.value)} placeholder="새 암호 한번 더 확인!" className="w-full px-4 py-3.5 bg-teal-50/50 border-2 border-teal-100 rounded-2xl font-black tracking-widest text-center text-teal-800 outline-none focus:border-teal-400 focus:bg-white transition-all"/>
                </div>
                <div className="flex gap-2 pt-2">
                  <button type="button" onClick={() => setShowPasswordChangeModal(false)} className="w-1/3 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-black text-sm transition-all">취소</button>
                  <button type="submit" className="w-2/3 py-3.5 bg-teal-500 hover:bg-teal-600 text-white font-black rounded-2xl text-sm shadow-lg shadow-teal-200 transition-all hover:-translate-y-1">안전하게 바꾸기 🔒</button>
                </div>
              </form>
            </div>
          )}

          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 bg-white p-6 rounded-[2.5rem] shadow-xl shadow-indigo-50/50 border-4 border-white relative overflow-hidden">
            <div className="absolute -right-10 -top-10 w-40 h-40 bg-indigo-50 rounded-full blur-3xl"></div>
            <div className="text-slate-600 font-bold text-lg relative z-10 flex items-center gap-2">
               <div className="w-12 h-12 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center text-xl shadow-inner border border-white">🎒</div>
               <div>안녕, <span className="text-indigo-600 font-black text-xl">{student.name}</span> 친구!<br/><span className="text-sm font-medium text-slate-400">오늘도 신나게 공부를 시작해볼까요? 🚀</span></div>
            </div>
            <div className="flex flex-wrap gap-2.5 w-full sm:w-auto relative z-10">
              <button onClick={openPracticeNotepad} className="flex-1 sm:flex-initial flex items-center justify-center gap-2 px-6 py-3.5 bg-gradient-to-r from-amber-400 to-orange-400 hover:from-amber-500 hover:to-orange-500 text-white rounded-2xl font-black text-sm shadow-lg shadow-amber-200 transition-all hover:-translate-y-1">
                <BookOpen size={18} strokeWidth={2.5}/> 연습장 펴기
              </button>
              <button onClick={() => setShowPasswordChangeModal(true)} className="flex-1 sm:flex-initial flex items-center justify-center gap-2 px-4 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-2xl font-black text-sm transition-all">
                <Settings size={18} /> 암호
              </button>
            </div>
          </div>

          <div className="flex gap-2 overflow-x-auto pb-4 mb-6 border-b-4 border-indigo-50 custom-scrollbar">
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`whitespace-nowrap px-4 md:px-6 py-4 rounded-t-[1.5rem] font-black text-sm md:text-[15px] transition-all relative ${activeTab === tab.id ? 'bg-indigo-500 text-white shadow-lg translate-y-1' : 'bg-white text-slate-400 hover:bg-slate-50 border-2 border-transparent hover:border-slate-100'}`}
              >
                {tab.label}
                {tab.count > 0 && (
                  <span className={`absolute -top-1 -right-1 transform text-[10px] font-black text-white px-2 py-0.5 rounded-full border-2 border-white shadow-sm ${tab.alert ? 'bg-rose-500 animate-pulse' : 'bg-blue-500'}`}>
                    {tab.count}
                  </span>
                )}
              </button>
            ))}
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {tabs.find(t => t.id === activeTab).data.length === 0 ? (
              <div className="col-span-full py-24 flex flex-col items-center justify-center text-center bg-white rounded-[3rem] border-4 border-dashed border-slate-100 shadow-sm">
                 <div className="text-4xl mb-4 opacity-50">✨</div>
                 <p className="text-slate-400 font-black text-lg">해당 탭에는 과제가 없어요!<br/>자유롭게 연습장을 펴고 놀아볼까요? 🎉</p>
              </div>
            ) : (
              tabs.find(t => t.id === activeTab).data.map(assign => (
                <div key={assign.id} className="bg-white rounded-[2rem] p-6 shadow-xl shadow-indigo-50/50 border-2 border-slate-100 hover:border-indigo-300 transition-all hover:-translate-y-2 flex flex-col justify-between group">
                  <div>
                    <div className="flex justify-between items-start mb-4">
                      <span className={`text-[11px] font-black px-3 py-1.5 rounded-xl shadow-sm border ${activeTab==='resubmit' ? 'bg-rose-50 border-rose-200 text-rose-600' : activeTab==='submitted' ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-indigo-50 border-indigo-200 text-indigo-600'}`}>
                        {activeTab === 'new' ? '✨ NEW' : activeTab === 'inProgress' ? '✏️ 푸는 중' : activeTab === 'resubmit' ? '🔥 다시 도전' : '💯 평가 대기중'}
                      </span>
                      {assign.deadline && <span className="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100 flex items-center gap-1"><Clock size={10}/> {assign.deadline}</span>}
                    </div>
                    <h3 className="text-lg font-black text-slate-800 mb-3 leading-snug group-hover:text-indigo-600 transition-colors">
                      {assign.status === 'closed' && <span className="text-rose-500 mr-1">[종료]</span>}
                      {assign.title}
                    </h3>
                    {assign.submission?.feedback && (
                      <div className="mt-3 p-4 bg-gradient-to-r from-amber-50 to-orange-50 rounded-2xl text-xs text-amber-900 border-2 border-amber-100 shadow-inner">
                        <span className="font-black block mb-1 flex items-center gap-1"><Lightbulb size={12}/> 선생님의 편지</span>{assign.submission.feedback}
                      </div>
                    )}
                  </div>
                  <button 
                    onClick={() => {
                      setActiveAssignment(assign);
                      if (assign.subStatus === 'new' && assign.instructions) showAlert('선생님의 다정한 안내 💌', assign.instructions);
                    }}
                    className={`mt-6 w-full py-4 rounded-2xl font-black text-white shadow-lg transition-all flex items-center justify-center gap-2 group-hover:scale-[1.02] ${activeTab === 'submitted' ? 'bg-slate-300 hover:bg-slate-400 shadow-slate-200' : activeTab === 'resubmit' ? 'bg-gradient-to-r from-rose-400 to-orange-400 hover:from-rose-500 hover:to-orange-500 shadow-rose-200' : 'bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 shadow-indigo-200'}`}
                  >
                    {activeTab === 'submitted' ? '내가 낸 과제 보기 👀' : <><Pencil size={18} strokeWidth={3}/> 학습지 펴기 ✨</>}
                  </button>
                </div>
              ))
            )}
          </div>
        </div>
      )
    }

    // ==========================================
    // FULLSCREEN DRAWING CANVAS
    // ==========================================
    function DrawingCanvas({ assignment, student, onClose, showAlert, showConfirm, schoolInfo }) {
      const canvasRefs = useRef({});
      const previewCanvasRef = useRef(null);
      const containerRef = useRef(null);
      const canvasContainerRef = useRef(null);
      const lastPosRef = useRef({ x: 0, y: 0 }); 
      
      const bgImages = assignment.baseImages || (assignment.baseImage ? [assignment.baseImage] : []);

      const [pages, setPages] = useState(() => {
        if (assignment.submission?.pagesData && assignment.submission.pagesData.length > 0) return assignment.submission.pagesData;
        if (assignment.submission?.drawingData) return [assignment.submission.drawingData];
        if (bgImages.length > 0) return Array(bgImages.length).fill('');
        return ['']; 
      });

            bCtx.font = '900 32px sans-serif'; bCtx.fillText(`2  +  1  =  ?`, 80, 220);

        if (isEraserMode) {

          tCtx.lineWidth = lineWidth * 5;
        } else {

        const rect = activeCanvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return { x: 0, y: 0 }; 

        const scaleX = activeCanvas.width / rect.width;
        const scaleY = activeCanvas.height / rect.height;
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };

      const pickColorAt = (x, y) => {
        try {
          const w = canvasSize.w, h = canvasSize.h;
          const temp = document.createElement('canvas');
          temp.width = w; temp.height = h;
          const tCtx = temp.getContext('2d');

            if (layer.visible && canvasRefs.current[layer.id]) tCtx.drawImage(canvasRefs.current[layer.id], 0, 0, w, h);

          const sx = Math.min(w - 1, Math.max(0, Math.round(x)));
          const sy = Math.min(h - 1, Math.max(0, Math.round(y)));
          const p = tCtx.getImageData(sx, sy, 1, 1).data;

      const runFloodFill = (targetX, targetY) => {
        pushUndoState();
        const activeCanvas = canvasRefs.current[activeLayerId];
        if (!activeCanvas) return;
        const ctx = activeCanvas.getContext('2d');
        const width = activeCanvas.width; const height = activeCanvas.height;
        const imgData = ctx.getImageData(0, 0, width, height); const data = imgData.data;

        let c = color;
        if (c.length === 4) c = '#' + c[1]+c[1]+c[2]+c[2]+c[3]+c[3];
        const fillR = parseInt(c.slice(1, 3), 16);
        const fillG = parseInt(c.slice(3, 5), 16);
        const fillB = parseInt(c.slice(5, 7), 16);
        const fillA = Math.round(opacity * 255);

        const startX = Math.round(targetX); const startY = Math.round(targetY);
        if (startX < 0 || startX >= width || startY < 0 || startY >= height) return;

        const startOffset = (startY * width + startX) * 4;
        const startR = data[startOffset]; const startG = data[startOffset + 1]; const startB = data[startOffset + 2]; const startA = data[startOffset + 3];

        if (Math.abs(startR - fillR) < 5 && Math.abs(startG - fillG) < 5 && Math.abs(startB - fillB) < 5 && Math.abs(startA - fillA) < 5) return;

        const queue = [[startX, startY]];
        const visited = new Uint8Array(width * height);

        const checkMatch = (offset) => {
          return Math.abs(data[offset] - startR) < 32 && Math.abs(data[offset + 1] - startG) < 32 && Math.abs(data[offset + 2] - startB) < 32 && Math.abs(data[offset + 3] - startA) < 32;
        };

          const [cx, cy] = queue.pop();
          const idx = cy * width + cx;
          if (visited[idx]) continue;
          visited[idx] = 1;

          const offset = idx * 4;
          if (checkMatch(offset)) {
            data[offset] = fillR; data[offset + 1] = fillG; data[offset + 2] = fillB; data[offset + 3] = fillA;
            if (cx > 0) queue.push([cx - 1, cy]);
            if (cx < width - 1) queue.push([cx + 1, cy]);
            if (cy > 0) queue.push([cx, cy - 1]);
            if (cy < height - 1) queue.push([cx, cy + 1]);
          }
        }
        ctx.putImageData(imgData, 0, 0);

        if (tool === 'eyedropper') {

        if (tool === 'text') {

        if (tool === 'paintbucket') { runFloodFill(x, y); return; }
        if (tool === 'shape') return;

        pushUndoState();
        setDrawStartCoords({ x, y });

        lastPosRef.current = { x, y };

          pCtx.moveTo(x, y);

        } else if (tool === 'eraser') {
          const lCtx = canvasRefs.current[activeLayerId].getContext('2d');
          applyContextStyle(lCtx, true, false);
          lCtx.beginPath();
          lCtx.moveTo(x, y);
        }
      };

      const draw = (e) => {
        if (!isDrawing || tool === 'shape' || tool === 'paintbucket' || tool === 'text' || isReadOnly || activeLayerId === 'base') return;
        if (inputMode === 'pen' && e.pointerType !== 'pen') return; 

        const activeCanvas = canvasRefs.current[activeLayerId];
        const previewCanvas = previewCanvasRef.current;
        if (!activeCanvas || !previewCanvas) return;

        const { x, y } = getCoordinates(e);

        if (tool === 'select') {
           const pCtx = previewCanvas.getContext('2d');
           pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
           pCtx.setLineDash([6, 6]);
           pCtx.strokeStyle = '#3b82f6'; 
           pCtx.lineWidth = 3;
           pCtx.strokeRect(drawStartCoords.x, drawStartCoords.y, x - drawStartCoords.x, y - drawStartCoords.y);
